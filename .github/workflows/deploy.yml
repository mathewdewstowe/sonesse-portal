name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run build
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name sonesse-website --branch main

      - name: Ensure sonesse.ai is a Pages custom domain
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "Checking existing custom domains..."
          DOMAINS=$(curl -s "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/pages/projects/sonesse-website/domains" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json")
          echo "$DOMAINS" | jq '.result[] | .name' 2>/dev/null || echo "No domains or jq parse issue"

          EXISTS=$(echo "$DOMAINS" | jq -r '.result[] | select(.name=="sonesse.ai") | .name' 2>/dev/null)
          if [ -z "$EXISTS" ]; then
            echo "Adding sonesse.ai as custom domain to Pages project..."
            RESULT=$(curl -s -X POST \
              "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/pages/projects/sonesse-website/domains" \
              -H "Authorization: Bearer $CF_TOKEN" \
              -H "Content-Type: application/json" \
              --data '{"name":"sonesse.ai"}')
            echo "Result: $RESULT"
          else
            echo "sonesse.ai already configured as custom domain."
          fi
