name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run build
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name sonesse-website --branch main

      - name: Reprovision sonesse.ai Pages custom domain + DNS
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          BASE="https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/pages/projects/sonesse-website/domains"

          echo "=== Deleting sonesse.ai custom domain (forces DNS reprovision) ==="
          DEL=$(curl -s -X DELETE "$BASE/sonesse.ai" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json")
          echo "Delete result: $DEL"

          sleep 3

          echo "=== Re-adding sonesse.ai custom domain ==="
          ADD=$(curl -s -X POST "$BASE" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"name":"sonesse.ai"}')
          echo "Add result: $ADD"

          echo "=== Current domains ==="
          curl -s "$BASE" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" | jq '.result[] | {name: .name, status: .status}'
