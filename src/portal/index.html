function LoginPage({ onLogin, onForgot, onSignUp }) {
  const [email, setEmail]     = useState("");
  const [password, setPassword] = useState("");
  const [showPw, setShowPw]   = useState(false);
  const [error, setError]     = useState("");

  const handleSubmit = async (e) => {
    e.preventDefault();
    setError("");

    setLoading(true);

    if (err) { setError(err.message); return; }
    onLogin(data.user.email);
  };

  return (
    <div style={styles.page}>
      <div className="portal-auth-container" style={styles.container}>

                <button type="button" onClick={() => setShowPw(!showPw)} style={{ position: "absolute", right: 12, top: "50%", transform: "translateY(-50%)", background: "none", border: "none", color: theme.textMuted, cursor: "pointer", padding: 0 }}>

  );
}

// в”Җв”Җ Sign Up в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function SignUpPage({ onBack, onSignedUp }) {
  const [email, setEmail]       = useState("");
  const [password, setPassword] = useState("");
  const [confirm, setConfirm]   = useState("");
  const [showPw, setShowPw]     = useState(false);
  const [error, setError]       = useState("");
  const [loading, setLoading]   = useState(false);
  const [done, setDone]         = useState(false);

  const handleSubmit = async (e) => {
    e.preventDefault();
    setError("");
    if (!email || !password || !confirm) { setError("Please fill in all fields."); return; }
    if (password.length < 8) { setError("Password must be at least 8 characters."); return; }
    if (password !== confirm) { setError("Passwords do not match."); return; }
    setLoading(true);
    const { data, error: err } = await sb.auth.signUp({ email, password });
    setLoading(false);
    if (err) { setError(err.message); return; }
    // Notify matthew@sonesse.ai вҖ” fire-and-forget, don't block signup
    fetch("/api/notify-signup", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email }),
    }).catch(() => {});
    // Supabase may auto-confirm or require email confirmation depending on settings
    if (data.session) {
      onSignedUp(data.user.email);
    } else {
      setDone(true); // email confirmation required
    }
  };

  return (
    <div style={styles.page}>
      <div className="portal-auth-container" style={styles.container}>
        <AuthLogo subtitle="Create your account" />
        <div style={styles.card}>
          {done ? (
            <div style={{ textAlign: "center" }}>
              <div style={{ width: 48, height: 48, borderRadius: "50%", background: theme.successBg, display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 16px", color: theme.success }}>{Icons.check}</div>
              <h3 style={{ color: theme.heading, margin: "0 0 8px", fontSize: 18 }}>Confirm your email</h3>
              <p style={{ color: theme.textMuted, fontSize: 13, margin: "0 0 24px" }}>We sent a confirmation link to <strong style={{ color: theme.heading }}>{email}</strong>. Click it to activate your account, then sign in.</p>
              <button onClick={onBack} style={{ ...styles.btnPrimary, width: "100%", justifyContent: "center" }}>Back to sign in</button>
            </div>
          ) : (
            <form onSubmit={handleSubmit}>
              <div style={{ marginBottom: 18 }}>
                <label style={styles.label}>Email address</label>
                <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} placeholder="you@company.com" style={styles.input} onFocus={(e) => e.target.style.borderColor = theme.borderFocus} onBlur={(e) => e.target.style.borderColor = theme.border} />
              </div>
              <div style={{ marginBottom: 18 }}>
                <label style={styles.label}>Password <span style={{ color: theme.textDim, fontWeight: 400 }}>(min. 8 characters)</span></label>
                <div style={{ position: "relative" }}>
                  <input type={showPw ? "text" : "password"} value={password} onChange={(e) => setPassword(e.target.value)} placeholder="Create a password" style={styles.input} onFocus={(e) => e.target.style.borderColor = theme.borderFocus} onBlur={(e) => e.target.style.borderColor = theme.border} />
                  <button type="button" onClick={() => setShowPw(!showPw)} style={{ position: "absolute", right: 12, top: "50%", transform: "translateY(-50%)", background: "none", border: "none", color: theme.textMuted, cursor: "pointer", padding: 0 }}>
                    {showPw ? Icons.eyeOff : Icons.eye}
                  </button>
                </div>
              </div>
              <div style={{ marginBottom: 24 }}>
                <label style={styles.label}>Confirm password</label>
                <input type={showPw ? "text" : "password"} value={confirm} onChange={(e) => setConfirm(e.target.value)} placeholder="Repeat your password" style={styles.input} onFocus={(e) => e.target.style.borderColor = theme.borderFocus} onBlur={(e) => e.target.style.borderColor = theme.border} />
              </div>
              {error && <div style={{ color: theme.danger, fontSize: 13, marginBottom: 16, padding: "8px 12px", background: "rgba(239,68,68,0.08)", borderRadius: 6 }}>{error}</div>}
              <button type="submit" disabled={loading} style={{ ...styles.btnPrimary, width: "100%", justifyContent: "center", opacity: loading ? 0.7 : 1 }}>
                {loading ? "Creating accountвҖҰ" : "Create account"}
              </button>
              <div style={{ marginTop: 20, textAlign: "center", fontSize: 13, color: theme.textMuted }}>
                Already have an account?{" "}
                <button type="button" onClick={onBack} style={styles.btnLink}>Sign in</button>
              </div>
            </form>
          )}
        </div>
      </div>
    </div>
  );
}

// в”Җв”Җ Reset Password (landed from email link with access_token in URL hash) в”Җв”Җв”Җв”Җв”Җ
function ResetPasswordPage({ onDone }) {
  const [password, setPassword] = useState("");
  const [confirm, setConfirm]   = useState("");
  const [showPw, setShowPw]     = useState(false);
  const [error, setError]       = useState("");
  const [loading, setLoading]   = useState(false);
  const [done, setDone]         = useState(false);

  const handleSubmit = async (e) => {
    e.preventDefault();
    setError("");
    if (!password || !confirm) { setError("Please fill in both fields."); return; }
    if (password.length < 8) { setError("Password must be at least 8 characters."); return; }
    if (password !== confirm) { setError("Passwords do not match."); return; }
    setLoading(true);
    const { error: err } = await sb.auth.updateUser({ password });
    setLoading(false);
    if (err) { setError(err.message); return; }
    setDone(true);
    setTimeout(onDone, 2000);
  };

  return (
    <div style={styles.page}>
      <div className="portal-auth-container" style={styles.container}>
        <AuthLogo subtitle="Set a new password" />
        <div style={styles.card}>
          {done ? (
            <div style={{ textAlign: "center" }}>
              <div style={{ width: 48, height: 48, borderRadius: "50%", background: theme.successBg, display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 16px", color: theme.success }}>{Icons.check}</div>
              <h3 style={{ color: theme.heading, margin: "0 0 8px", fontSize: 18 }}>Password updated</h3>
              <p style={{ color: theme.textMuted, fontSize: 13, margin: 0 }}>Signing you inвҖҰ</p>
            </div>
          ) : (
            <form onSubmit={handleSubmit}>
              <p style={{ color: theme.textMuted, fontSize: 13, margin: "0 0 20px" }}>Choose a new password for your account.</p>
              <div style={{ marginBottom: 18 }}>
                <label style={styles.label}>New password <span style={{ color: theme.textDim, fontWeight: 400 }}>(min. 8 characters)</span></label>
                <div style={{ position: "relative" }}>
                  <input type={showPw ? "text" : "password"} value={password} onChange={(e) => setPassword(e.target.value)} placeholder="New password" style={styles.input} onFocus={(e) => e.target.style.borderColor = theme.borderFocus} onBlur={(e) => e.target.style.borderColor = theme.border} />
                  <button type="button" onClick={() => setShowPw(!showPw)} style={{ position: "absolute", right: 12, top: "50%", transform: "translateY(-50%)", background: "none", border: "none", color: theme.textMuted, cursor: "pointer", padding: 0 }}>
                    {showPw ? Icons.eyeOff : Icons.eye}
                  </button>
                </div>
              </div>
              <div style={{ marginBottom: 24 }}>
                <label style={styles.label}>Confirm new password</label>
                <input type={showPw ? "text" : "password"} value={confirm} onChange={(e) => setConfirm(e.target.value)} placeholder="Repeat new password" style={styles.input} onFocus={(e) => e.target.style.borderColor = theme.borderFocus} onBlur={(e) => e.target.style.borderColor = theme.border} />
              </div>
              {error && <div style={{ color: theme.danger, fontSize: 13, marginBottom: 16, padding: "8px 12px", background: "rgba(239,68,68,0.08)", borderRadius: 6 }}>{error}</div>}
              <button type="submit" disabled={loading} style={{ ...styles.btnPrimary, width: "100%", justifyContent: "center", opacity: loading ? 0.7 : 1 }}>
                {loading ? "SavingвҖҰ" : "Set new password"}
              </button>
            </form>
          )}
        </div>
      </div>
    </div>
  );
}

// Pre-built avatar card shown on the dashboard
function PreBuiltAvatarCard({ name, desc, personaId, replicaId, tags, onUse, thumb, thumbVid }) {
  const [previewOpen, setPreviewOpen] = useState(false);
  const [webState, setWeb]        = useState("idle"); // idle | loading | done | error
  const [webUrl, setWebUrl]       = useState("");
  const [webError, setWebErr]     = useState("");
  const [teamsState, setTeams]    = useState("idle");
  const [teamsUrl, setTeamsUrl]   = useState("");
  const [teamsError, setTeamsErr] = useState("");
  const [teamsModalOpen, setTeamsModalOpen] = useState(false);

  // Session is created on-demand when user clicks "Deploy to Web"

  const deployWeb = () => {
    if (webState === "loading") return;
    if (webUrl) { window.open(webUrl, "_blank"); return; }
    setWeb("loading");
    setWebErr("");

    const doCreate = (rId) => {
      fetch("/api/tavus/conversations", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          replica_id: rId, persona_id: personaId, conversation_name: name,
          properties: { max_call_duration: 300, enable_recording: false, apply_greenscreen: false },
        }),
      })
        .then(r => r.json())
        .then(res => {
          const url = res.conversation_url || res.data?.conversation_url;
          const cid = res.conversation_id || res.data?.conversation_id;
          if (!url) throw new Error(res.error || res.message || "No URL returned");
          if (cid) trackConversation(cid, name);
          setWebUrl(url); setWeb("done"); window.open(url, "_blank");
        })
        .catch(e => { setWebErr(e.message); setWeb("error"); });
    };

    if (replicaId) {
      doCreate(replicaId);
    } else if (personaId) {
      // Fetch the persona to get its replica_id
      fetch(`/api/tavus/personas/${personaId}`)
        .then(r => r.json())
        .then(p => {
          const rId = p.replica_id || p.data?.replica_id;
          if (!rId) throw new Error("No replica_id found on persona");
          doCreate(rId);
        })
        .catch(e => { setWebErr(e.message); setWeb("error"); });
    } else {
      setWebErr("No avatar configured for this experience.");
      setWeb("error");
    }
  };

  // Reset deploy state to create a fresh session
  const resetWeb = () => {
    setWeb("idle");
    setWebUrl("");
    setWebErr("");
  };

  const deployTeams = async () => {
    if (teamsState === "loading") return;
    setTeams("loading");
    setTeamsErr("");
    try {
      const { data: { session: authSession } } = await sb.auth.getSession();
      const userEmail = authSession?.user?.email || "";
      const resp = await fetch("/api/teams/create-meeting", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ experienceId: personaId, experienceName: name, botEmail: "tavus.demo@my-meeting-bot.com", userEmail }),
      });
      const result = await resp.json();
      if (!result.ok) throw new Error(result.error || "Failed to create Teams meeting");
      setTeamsUrl(result.joinWebUrl || "");
      setTeams("done");
      setTeamsModalOpen(true);
    } catch (e) {
      setTeamsErr(e.message || "Failed to create Teams meeting");
      setTeams("error");
    }
  };

  // Platform logo SVGs
  const TeamsLogo = () => (
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M13.5 5.5a2 2 0 1 0 0-4 2 2 0 0 0 0 4z" fill="currentColor"/>
      <path d="M20 8h-7a1 1 0 0 0-1 1v5.5a3.5 3.5 0 0 0 7 0V9a1 1 0 0 0-1-1z" fill="currentColor" opacity="0.7"/>
      <path d="M9.5 7.5a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3z" fill="currentColor"/>
      <path d="M4 10h7a1 1 0 0 1 1 1v4a3 3 0 0 1-6 0v-4a1 1 0 0 1 1-1H4z" fill="currentColor"/>
    </svg>
  );
  const ZoomLogo = () => (
    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
      <rect x="2" y="6" width="13" height="12" rx="2"/>
      <path d="M15 10l5-3v10l-5-3v-4z"/>
    </svg>
  );
  const MeetLogo = () => (
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="2" y="6" width="13" height="12" rx="2" fill="currentColor"/>
      <path d="M15 10.5l5.5-3.5v10l-5.5-3.5v-3z" fill="currentColor" opacity="0.7"/>
    </svg>
  );

  return (
    <div style={{ ...styles.card, padding: 0, overflow: "hidden", border: `1.5px solid ${theme.primary}30` }}>
      {/* Teams boot modal */}
      {teamsModalOpen && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.6)", zIndex: 2000, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }} onClick={() => setTeamsModalOpen(false)}>
          <div style={{ background: "#fff", borderRadius: 16, padding: 32, maxWidth: 440, width: "100%", boxShadow: "0 20px 60px rgba(0,0,0,0.25)" }} onClick={e => e.stopPropagation()}>
            <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 16 }}>
              <div style={{ width: 44, height: 44, borderRadius: 12, background: "#5059C910", display: "flex", alignItems: "center", justifyContent: "center" }}>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M13.5 5.5a2 2 0 1 0 0-4 2 2 0 0 0 0 4z" fill="#5059C9"/>
                  <path d="M20 8h-7a1 1 0 0 0-1 1v5.5a3.5 3.5 0 0 0 7 0V9a1 1 0 0 0-1-1z" fill="#5059C9" opacity="0.7"/>
                  <path d="M9.5 7.5a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3z" fill="#5059C9"/>
                  <path d="M4 10h7a1 1 0 0 1 1 1v4a3 3 0 0 1-6 0v-4a1 1 0 0 1 1-1H4z" fill="#5059C9"/>
                </svg>
              </div>
              <div>
                <div style={{ fontWeight: 700, fontSize: 16, color: "#111827" }}>Your session is booting up</div>
                <div style={{ fontSize: 12, color: "#6b7280", marginTop: 2 }}>Microsoft Teams</div>
              </div>
            </div>
            <p style={{ fontSize: 14, color: "#374151", lineHeight: 1.6, margin: "0 0 12px" }}>
              This can take <strong>up to 10 minutes</strong>. Open Microsoft Teams and wait for your avatar to arrive in the meeting.
            </p>
            <p style={{ fontSize: 13, color: "#6b7280", lineHeight: 1.6, margin: "0 0 24px", padding: "12px 14px", background: "#f9fafb", borderRadius: 8, border: "1px solid #e5e7eb" }}>
              In production, sessions are scheduled and hot-started in advance of any invites вҖ” so avatars join instantly.
            </p>
            <button onClick={() => { setTeamsModalOpen(false); if (teamsUrl) window.open(teamsUrl, "_blank"); }} style={{ width: "100%", padding: "11px 0", borderRadius: 8, background: "#5059C9", color: "#fff", border: "none", fontWeight: 600, fontSize: 14, cursor: "pointer" }}>
              Continue вҖ” Open Microsoft Teams
            </button>
          </div>
        </div>

      {/* Accent stripe */}
      <div style={{ height: 4, background: `linear-gradient(90deg, ${theme.primary}, #a855f7)` }} />

            <video src={thumbVid} muted playsInline preload="auto"
              onLoadedMetadata={e => { try { e.target.currentTime = 1; } catch(_){} }}
              onCanPlay={e => { if (e.target.paused) { try { e.target.currentTime = 1; } catch(_){} } }}
              style={{ width: "100%", height: "100%", objectFit: "cover", display: "block" }} />
          ) : thumb ? (
            <img src={thumb} alt={name} style={{ width: "100%", height: "100%", objectFit: "cover", display: "block" }} onError={e => { e.target.style.display = "none"; }} />
          ) : (
            <div style={{ width: "100%", height: "100%", background: `linear-gradient(135deg, ${theme.primary}20, ${theme.primary}08)`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22, fontWeight: 800, color: `${theme.primary}60` }}>
              {name.split(" ").map(w => w[0]).join("").slice(0, 2)}

// Step 4b: Choose Tavus Avatar (replica selection + live preview)
function StepChooseTavusAvatar({ data, onChange }) {
  const [replicas, setReplicas] = useState([]);
  const [loading, setLoading] = useState(true);
  const [previewOpen, setPreviewOpen] = useState(false);
  const [previewUrl, setPreviewUrl] = useState("");
  const [previewIsVideo, setPreviewIsVideo] = useState(false); // true = pre-recorded clip
  const [previewing, setPreviewing] = useState(null);
  const [error, setError] = useState("");

  // Fallback placeholder replicas if API not yet configured
  const PLACEHOLDER_REPLICAS = [
    { replica_id: "r4d67a0a3f", replica_name: "Alex", thumbnail_image_url: "https://images.unsplash.com/photo-1560250097-0b93528c311a?w=400&h=300&fit=crop&crop=faces,center" },
    { replica_id: "r7e1c033f2", replica_name: "Sarah", thumbnail_image_url: "https://images.unsplash.com/photo-1573497019940-1c28c88b4f3e?w=400&h=300&fit=crop&crop=faces,center" },
    { replica_id: "r9f2b1d8e1", replica_name: "Marcus", thumbnail_image_url: "https://images.unsplash.com/photo-1519085360753-af0119f7cbe7?w=400&h=300&fit=crop&crop=faces,center" },
    { replica_id: "r2c8a4e7d3", replica_name: "Priya", thumbnail_image_url: "https://images.unsplash.com/photo-1580489944761-15a19d654956?w=400&h=300&fit=crop&crop=faces,center" },
    { replica_id: "r5b3f9c2a8", replica_name: "Jordan", thumbnail_image_url: "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=400&h=300&fit=crop&crop=faces,center" },
  ];

  useEffect(() => {
    const CACHE_KEY = "tavus_replicas_cache";
    const CACHE_TTL = 60 * 60 * 1000; // 1 hour
    try {
      const cached = JSON.parse(localStorage.getItem(CACHE_KEY) || "null");
      if (cached && Date.now() - cached.ts < CACHE_TTL && cached.list?.length > 0) {
        setReplicas(cached.list.slice(0, 8));
        setLoading(false);
        return;
      }
    } catch (_) {}

    fetch("/api/tavus/replicas")
      .then(r => r.ok ? r.json() : Promise.reject())
      .then(d => {
        const raw = d.data || d.replicas || d || [];
        const list = raw.filter(r =>
          r.replica_name &&
          !r.replica_name.toLowerCase().includes("deprecated") &&
          r.status !== "deprecated" &&
          // Keep only stock/system replicas вҖ” exclude user-trained ones
          (r.replica_type === "system" || r.replica_type === "stock" || !r.replica_type)
        );
        const result = (list.length > 0 ? list : PLACEHOLDER_REPLICAS).slice(0, 8);
        try { localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), list: result })); } catch (_) {}
        setReplicas(result);
      })
      .catch(() => setReplicas(PLACEHOLDER_REPLICAS))
      .finally(() => setLoading(false));
  }, []);

  const handlePreview = async (replica) => {
    // Use pre-recorded thumbnail video clip if available вҖ” instant and free
    const clipUrl = replica.thumbnail_video_url || replica.preview_video_url;
    if (clipUrl) {
      setPreviewUrl(clipUrl);
      setPreviewIsVideo(true);
      setPreviewOpen(true);
      return;
    }
    // No clip available вҖ” fall back to starting a live Tavus conversation
    setPreviewing(replica.replica_id);
    try {
      const resp = await fetch("/api/tavus/conversations", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          replica_id: replica.replica_id,
          conversation_name: `Preview вҖ” ${replica.replica_name}`,
          conversational_context: "You are a friendly AI assistant. This is a brief 60-second preview. Greet the user warmly and briefly describe how you can help with recruitment screening interviews.",
          properties: { max_call_duration: 120, enable_recording: false, apply_greenscreen: false },
        }),
      });
      const res = await resp.json();
      const url = res.conversation_url || res.data?.conversation_url;
      if (url) {
        setPreviewUrl(url);
        setPreviewIsVideo(false);
        setPreviewOpen(true);
      } else {
        const msg = res.message || res.error || res.detail || JSON.stringify(res);
        setError(`Preview failed: ${msg}`);
      }
    } catch (err) {
      setError(`Preview unavailable: ${err.message}`);
    } finally {
      setPreviewing(null);
    }
  };

  const selected = data.tavusReplicaId;
  const [playing, setPlaying] = useState(null); // replica_id of the card currently playing

  const togglePreview = (e, repId) => {
    e.stopPropagation();
    const card = e.currentTarget.closest("[data-rep-id]");
    const video = card?.querySelector("video");
    if (!video) return;
    if (video.paused) {
      document.querySelectorAll(".avatar-chooser-video").forEach(v => { if (v !== video) { v.pause(); } });
      video.play();
      setPlaying(repId);
    } else {
      video.pause();
      setPlaying(null);
    }
  };

  return (
    <div>
      <h2 style={{ color: theme.heading, margin: "0 0 6px", fontSize: 22, fontWeight: 700 }}>Choose your Avatar</h2>
      <p style={{ color: theme.textMuted, margin: "0 0 28px", fontSize: 14 }}>Select a Tavus avatar to use for your experience.</p>

      {error && (
        <div style={{ marginBottom: 16, padding: "10px 14px", background: "rgba(239,68,68,0.06)", border: "1px solid rgba(239,68,68,0.2)", borderRadius: 8, fontSize: 12, color: theme.danger }}>
          {error} <button onClick={() => setError("")} style={{ marginLeft: 8, background: "none", border: "none", cursor: "pointer", color: theme.textDim, fontSize: 12 }}>вң•</button>
        </div>
      )}

      {loading ? (
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(200px, 1fr))", gap: 14 }}>
          {[1,2,3,4,5,6,7,8].map(i => (
            <div key={i} style={{ ...styles.card, padding: 0, overflow: "hidden", opacity: 0.5 }}>
              <div style={{ height: 160, background: "#f0f0f2", borderRadius: "10px 10px 0 0" }} />
              <div style={{ padding: "14px 16px 16px" }}>
                <div style={{ height: 12, width: "60%", background: "#e5e5e7", borderRadius: 4 }} />
              </div>
            </div>
          ))}
        </div>
      ) : (
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(200px, 1fr))", gap: 14 }}>
          {replicas.slice(0, 8).map((rep) => {
            const isSelected = selected === rep.replica_id;
            const isPlaying = playing === rep.replica_id;
            const hasVideo = !!(rep.thumbnail_video_url || rep.preview_video_url);
            return (
              <div key={rep.replica_id} data-rep-id={rep.replica_id}
                style={{ ...styles.card, padding: 0, overflow: "hidden", borderColor: isSelected ? theme.selectedBorder : theme.border, boxShadow: isSelected ? `0 0 0 1px ${theme.selectedBorder}` : "none", cursor: "pointer", transition: "all 0.15s" }}
                onClick={() => onChange({ ...data, tavusReplicaId: rep.replica_id, tavusReplicaName: rep.replica_name })}>
                {/* Thumbnail */}
                <div style={{ position: "relative", height: 200, background: "#111", overflow: "hidden", display: "flex", alignItems: "center", justifyContent: "center" }}>
                  {rep.thumbnail_image_url ? (
                    <img src={rep.thumbnail_image_url} alt={rep.replica_name} style={{ width: "100%", height: "100%", objectFit: "cover", objectPosition: "center 15%", display: "block" }} onError={(e) => { e.target.style.display = "none"; }} />
                  ) : hasVideo ? (
                    <video
                      className="avatar-chooser-video"
                      src={rep.thumbnail_video_url || rep.preview_video_url}
                      muted
                      playsInline
                      preload="metadata"
                      onLoadedMetadata={e => { e.target.currentTime = 0.5; }}
                      style={{ width: "100%", height: "100%", objectFit: "cover", objectPosition: "center 15%", display: "block" }}
                    />
                  ) : (
                    <div style={{ fontSize: 36, fontWeight: 800, color: `${theme.primary}60` }}>
                      {(rep.replica_name || "?").split(" ").map(w => w[0]).join("").slice(0, 2).toUpperCase()}
                    </div>
                  )}
                  {isSelected && (
                    <div style={{ position: "absolute", top: 8, right: 8, width: 24, height: 24, borderRadius: "50%", background: theme.primary, display: "flex", alignItems: "center", justifyContent: "center" }}>
                      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                    </div>
                  )}
                </div>
                {/* Info + preview */}
                <div style={{ padding: "10px 14px 12px" }}>
                  <div style={{ fontWeight: 700, fontSize: 14, color: theme.heading, marginBottom: 8 }}>{rep.replica_name}</div>
                  <button
                    onClick={e => togglePreview(e, rep.replica_id)}
                    disabled={!hasVideo}
                    style={{ ...styles.btnSecondary, width: "100%", justifyContent: "center", fontSize: 12, padding: "6px 10px", opacity: hasVideo ? 1 : 0.35, cursor: hasVideo ? "pointer" : "default" }}>
                    {isPlaying ? "вҸё Pause" : "в–¶ Preview"}
                  </button>
                </div>

            );
          })}
        </div>
      )}

      {!selected && !loading && (
        <div style={{ marginTop: 20, padding: "12px 16px", background: theme.surface, borderRadius: 8, border: `1px solid ${theme.border}`, fontSize: 12, color: theme.textDim, textAlign: "center" }}>

        </div>
      )}
      {selected && (
        <div style={{ marginTop: 20, padding: "12px 16px", background: theme.primaryLight, border: `1px solid ${theme.primaryMed}`, borderRadius: 8, fontSize: 12, color: theme.textMuted }}>

                <div style={{ position: "absolute", bottom: 50, left: 0, right: 0, textAlign: "center", pointerEvents: "none" }}>

function StepAvatarSettings({ data, onChange }) {
  const [mode, setMode] = useState(data.avatarSettingsMode || "default");

  // All Tavus persona layer config lives in data.tavusLayers
  const layers   = data.tavusLayers || {};
  const setLayer = (key, val) => onChange({ ...data, tavusLayers: { ...layers, [key]: val } });

  // Shared helpers
  const Field = ({ label, hint, children }) => (
    <div style={{ display: "grid", gap: 6 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
        <span style={{ fontSize: 13, fontWeight: 500, color: theme.heading }}>{label}</span>
        {hint && <span style={{ fontSize: 11, color: theme.textDim }}>в“ҳ</span>}
      </div>
      {children}
    </div>
  );

  const LayerSelect = ({ stateKey, options, defaultId }) => {
    const val = layers[stateKey] || defaultId;
    return (
      <select value={val} onChange={e => setLayer(stateKey, e.target.value)}
        style={{ ...styles.select, fontSize: 13, padding: "9px 14px", width: "100%" }}>
        {options.map(o => (
          <option key={o.id} value={o.id}>
            {o.name}{o.badge === "recommended" ? " вҳ…" : o.badge ? ` (${o.badge})` : ""}
          </option>
        ))}
      </select>
    );
  };

  const TagList = ({ stateKey, placeholder }) => {
    const [input, setInput] = useState("");
    const items = layers[stateKey] || [];
    const add = () => { const v = input.trim(); if (v) { setLayer(stateKey, [...items, v]); setInput(""); } };
    return (
      <div style={{ border: `1px solid ${theme.border}`, borderRadius: 8, padding: "10px 14px", background: theme.surface }}>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: items.length ? 8 : 0 }}>
          {items.map(t => (
            <span key={t} style={{ fontSize: 12, padding: "3px 10px", borderRadius: 20, background: theme.primaryLight, color: theme.primary, fontWeight: 600, display: "flex", alignItems: "center", gap: 5 }}>
              {t} <span onClick={() => setLayer(stateKey, items.filter(x => x !== t))} style={{ cursor: "pointer", fontWeight: 700 }}>Г—</span>
            </span>
          ))}
        </div>
        <div style={{ display: "flex", gap: 6 }}>
          <input value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => e.key === "Enter" && add()}
            placeholder={placeholder || "Add item..."}
            style={{ ...styles.input, marginBottom: 0, fontSize: 12, padding: "5px 10px", flex: 1 }}
            onFocus={e => e.target.style.borderColor = theme.borderFocus}
            onBlur={e => e.target.style.borderColor = theme.border} />
          <button onClick={add} style={{ ...styles.btnSecondary, padding: "5px 14px", fontSize: 12 }}>+ Add</button>
        </div>
      </div>
    );
  };

  const sep = <div style={{ borderTop: `1px solid ${theme.border}`, margin: "4px 0" }} />;

  return (
    <div>
      <h2 style={{ color: theme.heading, margin: "0 0 6px", fontSize: 22, fontWeight: 700 }}>Avatar Layers</h2>
      <p style={{ color: theme.textMuted, margin: "0 0 20px", fontSize: 14 }}>Configure the Tavus persona layers вҖ” exactly the same settings as the Tavus dashboard.</p>

      <div style={{ display: "flex", borderRadius: 8, border: `1px solid ${theme.border}`, overflow: "hidden", marginBottom: 20, width: "fit-content" }}>
        {["default", "advanced"].map(m => (
          <button key={m} onClick={() => { setMode(m); onChange({ ...data, avatarSettingsMode: m }); }}
            style={{ padding: "7px 18px", fontSize: 13, fontWeight: 600, border: "none", cursor: "pointer", background: mode === m ? theme.primary : "transparent", color: mode === m ? "#fff" : theme.textMuted, transition: "all 0.15s" }}>
            {m === "default" ? "Defaults" : "Advanced"}
          </button>
        ))}
      </div>

      {mode === "default" ? (
        <div style={{ padding: "16px 20px", background: theme.primaryLight, borderRadius: 10, border: `1px solid ${theme.primaryMed}`, fontSize: 13, color: theme.textMuted }}>
          <span style={{ fontWeight: 700, color: theme.primary }}>Defaults applied. </span>Sonesse uses best-in-class settings for your use case automatically. Switch to Advanced to customise each layer.
        </div>
      ) : (
        <div style={{ display: "grid", gap: 20 }}>

          {/* LLM */}
          <div style={{ ...styles.card, padding: "20px 24px", display: "grid", gap: 16 }}>
            <div style={{ fontSize: 14, fontWeight: 700, color: theme.heading }}>Language Model (LLM)</div>
            <Field label="Model">
              <LayerSelect stateKey="llmModel" options={TAVUS_LLMS} defaultId="tavus-gpt-oss" />
            </Field>
            <Field label="Tools" hint="Function tools the LLM can call">
              <TagList stateKey="llmTools" placeholder="Tool name..." />
            </Field>
          </div>

          {sep}

          {/* Turn Detection */}
          <div style={{ ...styles.card, padding: "20px 24px", display: "grid", gap: 16 }}>
            <div style={{ fontSize: 14, fontWeight: 700, color: theme.heading }}>Turn Detection Model</div>
            <Field label="Model">
              <LayerSelect stateKey="turnDetection" options={TAVUS_TURN_DETECTION_MODELS} defaultId="sparrow-1" />
            </Field>
          </div>

          {sep}

          {/* Perception */}
          <div style={{ ...styles.card, padding: "20px 24px", display: "grid", gap: 16 }}>
            <div style={{ fontSize: 14, fontWeight: 700, color: theme.heading }}>Perception Model</div>
            <Field label="Model">
              <LayerSelect stateKey="perceptionModel" options={TAVUS_PERCEPTION_MODELS} defaultId="raven-1" />
            </Field>
            <Field label="Visual Tools" hint="Tools triggered by visual perception">
              <TagList stateKey="visualTools" placeholder="Visual tool name..." />
            </Field>
            <Field label="Audio Tools" hint="Tools triggered by audio perception">
              <TagList stateKey="audioTools" placeholder="Audio tool name..." />
            </Field>
          </div>

          {sep}

          {/* STT */}
          <div style={{ ...styles.card, padding: "20px 24px", display: "grid", gap: 16 }}>
            <div style={{ fontSize: 14, fontWeight: 700, color: theme.heading }}>Speech-to-Text (STT)</div>
            <Field label="Engine">
              <LayerSelect stateKey="sttEngine" options={TAVUS_STT_ENGINES} defaultId="tavus-advanced" />
            </Field>
            <Field label="Hotwords (STT)" hint="Comma-separated words to boost recognition accuracy">
              <input value={layers.hotwords || ""} onChange={e => setLayer("hotwords", e.target.value)}
                placeholder="e.g. Sonesse, StackOne, demo"
                style={{ ...styles.input, marginBottom: 0, fontSize: 13 }}
                onFocus={e => e.target.style.borderColor = theme.borderFocus}
                onBlur={e => e.target.style.borderColor = theme.border} />

          </div>

          {sep}

          {/* Knowledge Base */}
          <div style={{ ...styles.card, padding: "20px 24px", display: "flex", alignItems: "flex-start", gap: 16 }}>

              <TagList stateKey="knowledgeBaseIds" placeholder="Document ID..." />

        </div>
      )}
    </div>
  );
}

// Step 7: Knowledge Base вҖ” job description + resume PDFs only
function StepKnowledgeBase({ data, onChange }) {
  const [uploading, setUploading] = useState({});
  const docs = [
    { key: "kbJobDesc",  label: "Job Description",    hint: "Upload the job description for this role (PDF)" },
    { key: "kbResume",   label: "Candidate Resume",   hint: "Upload a sample candidate resume for calibration (PDF)" },
  ];

  const handleUpload = async (key, e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    setUploading(prev => ({ ...prev, [key]: true }));
    try {
      const session = (await sb.auth.getSession()).data.session;
      let publicUrl = null;
      if (session) {
        const path = `${session.user.id}/kb/${key}-${Date.now()}.pdf`;
        const { error } = await sb.storage.from("logos").upload(path, file, { upsert: true });
        if (!error) {
          publicUrl = sb.storage.from("logos").getPublicUrl(path).data.publicUrl;
        }
      }

      // Send to Tavus Knowledge Base if we have a public URL
      let documentId = null;
      if (publicUrl) {
        try {
          const resp = await fetch("/api/tavus/documents", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              document_name: `${key}-${file.name}`,
              document_url: publicUrl,
              tags: [key, data.useCase || "recruitment"],
            }),
          });
          const result = await resp.json();
          documentId = result.document_id || null;
        } catch (err) {
          console.warn("Tavus KB upload failed:", err);
        }
      }

      onChange({
        ...data,
        [key]: { name: file.name, size: `${Math.round(file.size/1024)}KB`, url: publicUrl, documentId },
        // Maintain a flat list of all Tavus document IDs for easy access
        kbDocumentIds: [
          ...(data.kbDocumentIds || []).filter(id => id !== data[key]?.documentId),
          ...(documentId ? [documentId] : []),
        ],
      });
    } finally {
      setUploading(prev => ({ ...prev, [key]: false }));
    }
  };

  const removeDoc = (key) => {
    const removedDocId = data[key]?.documentId;
    const next = { ...data };
    delete next[key];
    // Remove from document IDs list
    if (removedDocId) {
      next.kbDocumentIds = (next.kbDocumentIds || []).filter(id => id !== removedDocId);
    }
    onChange(next);
  };

  return (
    <div>
      <h2 style={{ color: theme.heading, margin: "0 0 6px", fontSize: 22, fontWeight: 700 }}>Knowledge Base</h2>
      <p style={{ color: theme.textMuted, margin: "0 0 28px", fontSize: 14 }}>Upload the job description and a sample resume so your avatar understands the role context.</p>

      <div style={{ display: "grid", gap: 20 }}>
        {docs.map((doc) => {
          const uploaded = data[doc.key];
          return (
            <div key={doc.key}>
              <label style={styles.label}>{doc.label}</label>
              <p style={{ fontSize: 12, color: theme.textMuted, margin: "0 0 10px" }}>{doc.hint}</p>
              {uploaded ? (

// Step 8: Data Sources
function StepDataSources({ data, onChange }) {
  const connectedATS  = (data.connectedIntegrations || []).find(id => STACKONE_ATS_IDS.includes(id));
  const connectedCRM  = (data.connectedIntegrations || []).find(id => STACKONE_CRM_IDS.includes(id));
  const connectedHRIS = (data.connectedIntegrations || []).find(id => STACKONE_HRIS_IDS.includes(id));
  const connectedLMS  = (data.connectedIntegrations || []).find(id => STACKONE_LMS_IDS.includes(id));
  const connectedInt  = connectedATS || connectedCRM || connectedHRIS || connectedLMS;
  const allInts = INTEGRATIONS[data.useCase] || INTEGRATIONS.recruitment;
  const intMeta = allInts.find(i => i.id === connectedInt) || {};
  const intName = intMeta.name || null;

  const ucATS  = data.useCase === 'recruitment';
  const ucCRM  = data.useCase === 'sales' || data.useCase === 'sdr';
  const ucLMS  = data.useCase === 'tutoring' || data.useCase === 'coaching';
  const ucHRIS = data.useCase === 'onboarding';

  const systemType = (connectedATS || ucATS) ? 'ats'
                   : (connectedCRM  || ucCRM)  ? 'crm'
                   : (connectedHRIS || ucHRIS) ? 'hris'
                   : (connectedLMS  || ucLMS)  ? 'lms'
                   : null;

  const fields = systemType ? (DATA_SOURCE_FIELDS[systemType] || []) : [];
  const confirmed = data.confirmedDataSources || [];
  const enabled   = data.enabledDataSources   || fields.filter(f => f.required).map(f => f.id);

  const toggleConfirm = (id) => {
    const next = confirmed.includes(id) ? confirmed.filter(c => c !== id) : [...confirmed, id];
    onChange({ ...data, confirmedDataSources: next });
  };

  const toggleEnabled = (id, required) => {
    if (required) return;
    const next = enabled.includes(id) ? enabled.filter(e => e !== id) : [...enabled, id];
    onChange({ ...data, enabledDataSources: next });
  };

  const confirmAll = () => {
    onChange({ ...data, confirmedDataSources: enabled });
  };

  const allConfirmed = enabled.length > 0 && enabled.every(id => confirmed.includes(id));

  const systemLabels = { ats: 'ATS', crm: 'CRM', hris: 'HRIS', lms: 'LMS' };

  return (
    <div>
      <h2 style={{ color: theme.heading, margin: "0 0 6px", fontSize: 22, fontWeight: 700 }}>Data sources</h2>
      <p style={{ color: theme.textMuted, margin: "0 0 20px", fontSize: 14 }}>
        Confirm which data fields Sonesse pulls from your connected system to personalise each session. Review the API call for each field and approve before continuing.
      </p>

      {connectedInt && (
        <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 14px", background: theme.primaryLight, border: `1px solid ${theme.primaryMed}`, borderRadius: 8, marginBottom: 20 }}>
          <div style={{ width: 28, height: 28, borderRadius: 6, background: theme.primary, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 800, fontSize: 11, color: "#fff", flexShrink: 0 }}>S1</div>
          <div>
            <div style={{ fontSize: 13, fontWeight: 600, color: theme.primary }}>StackOne unified {systemLabels[systemType]} вҖ” {intName}</div>
            <div style={{ fontSize: 11, color: theme.textMuted }}>Fields below are fetched via the StackOne unified API at session start</div>
          </div>
        </div>
      )}

      {fields.length === 0 ? (
        <div style={{ ...styles.card, padding: "24px 20px", textAlign: "center" }}>
          <div style={{ fontSize: 13, color: theme.textMuted, marginBottom: 8 }}>No integration connected.</div>
          <div style={{ fontSize: 12, color: theme.textDim }}>Sonesse will prompt participants to provide their details at session start.</div>
        </div>
      ) : (
        <>
          {/* Field table */}
          <div style={{ ...styles.card, padding: 0, overflow: "hidden", marginBottom: 16 }}>
            {/* Header */}
            <div style={{ display: "grid", gridTemplateColumns: "28px 1fr 1.6fr 90px", gap: 0, padding: "10px 16px", background: theme.surface, borderBottom: `1px solid ${theme.border}` }}>
              <span />
              <span style={{ fontSize: 11, fontWeight: 700, color: theme.textMuted, textTransform: "uppercase", letterSpacing: "0.04em" }}>Data field</span>
              <span style={{ fontSize: 11, fontWeight: 700, color: theme.textMuted, textTransform: "uppercase", letterSpacing: "0.04em" }}>Source (StackOne API)</span>
              <span style={{ fontSize: 11, fontWeight: 700, color: theme.textMuted, textTransform: "uppercase", letterSpacing: "0.04em", textAlign: "center" }}>Approved</span>
            </div>

            {fields.map((field, idx) => {
              const isEnabled   = enabled.includes(field.id);
              const isConfirmed = confirmed.includes(field.id);
              const isLast = idx === fields.length - 1;

              return (
                <div key={field.id} style={{
                  display: "grid", gridTemplateColumns: "28px 1fr 1.6fr 90px", gap: 0,
                  alignItems: "center", padding: "14px 16px",
                  borderBottom: isLast ? "none" : `1px solid ${theme.border}`,
                  background: !isEnabled ? "#fafafa" : isConfirmed ? `${theme.primary}04` : "transparent",
                  opacity: !isEnabled ? 0.5 : 1,
                  transition: "background 0.15s",
                }}>
                  {/* Enable/disable toggle for optional fields */}
                  <div>
                    {field.required ? (
                      <div style={{ width: 8, height: 8, borderRadius: "50%", background: theme.primary, margin: "0 auto" }} title="Required" />
                    ) : (
                      <button onClick={() => toggleEnabled(field.id, false)} style={{ background: "none", border: "none", cursor: "pointer", padding: 0, display: "flex", alignItems: "center", justifyContent: "center" }} title={isEnabled ? "Disable this field" : "Enable this field"}>
                        <div style={{ width: 14, height: 14, borderRadius: 3, border: `1.5px solid ${isEnabled ? theme.primary : theme.border}`, background: isEnabled ? theme.primary : "transparent", display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontSize: 9, transition: "all 0.15s" }}>
                          {isEnabled && "вң“"}
                        </div>
                      </button>
                    )}
                  </div>

                  {/* Field info */}
                  <div>
                    <div style={{ fontWeight: 600, fontSize: 13, color: theme.heading, display: "flex", alignItems: "center", gap: 6 }}>
                      {field.label}
                      {field.required && <span style={{ fontSize: 9, fontWeight: 700, padding: "1px 6px", borderRadius: 10, background: theme.primaryMed, color: theme.primary, textTransform: "uppercase", letterSpacing: "0.04em" }}>Required</span>}
                    </div>
                    <div style={{ fontFamily: "monospace", fontSize: 11, color: theme.textMuted, marginTop: 2 }}>{field.field}</div>
                  </div>

                  {/* API endpoint */}
                  <div style={{ fontFamily: "monospace", fontSize: 10.5, color: theme.textDim, lineHeight: 1.4, paddingRight: 12 }}>
                    <span style={{ fontWeight: 700, color: "#2563eb", marginRight: 4 }}>GET</span>
                    {field.endpoint.replace("GET ", "")}
                  </div>

                  {/* Approve button */}
                  <div style={{ textAlign: "center" }}>
                    {isEnabled && (
                      <button onClick={() => toggleConfirm(field.id)} style={{
                        padding: "5px 12px", borderRadius: 6, fontSize: 11, fontWeight: 700, cursor: "pointer", border: "none", transition: "all 0.15s",
                        background: isConfirmed ? theme.successBg : theme.surface,
                        color: isConfirmed ? theme.success : theme.textMuted,
                        border: `1px solid ${isConfirmed ? theme.successBorder : theme.border}`,
                      }}>
                        {isConfirmed ? "вң“ Approved" : "Approve"}
                      </button>
                    )}
                  </div>
                </div>
              );
            })}
          </div>

          {/* Approve all */}
          {!allConfirmed && (
            <button onClick={confirmAll} style={{ ...styles.btnPrimary, fontSize: 13 }}>
              Approve all fields
            </button>
          )}
          {allConfirmed && (
            <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "10px 16px", background: theme.successBg, border: `1px solid ${theme.successBorder}`, borderRadius: 8, fontSize: 13, color: theme.success, fontWeight: 600 }}>
              {Icons.check} All data sources approved вҖ” ready to continue
            </div>
          )}
        </>
      )}
    </div>
  );
}

// Step 11: Preview & Launch
function StepPreview({ data, onSaved }) {
  const [deploying, setDeploying]   = useState(false);
  const [launched, setLaunched]     = useState(false);
  const [meetingUrl, setMeetingUrl] = useState("");
  const [error, setError]           = useState("");
  const vendor = AVATAR_VENDORS.find((v) => v.id === data.avatar);

  const platforms = [
    { id: "web",   label: "Web",             color: theme.primary, desc: "Open in browser", comingSoon: false, icon: (
      <svg width="28" height="28" viewBox="0 0 40 40" fill="none"><rect width="40" height="40" rx="10" fill={theme.primary}/><circle cx="20" cy="20" r="10" stroke="white" strokeWidth="2" fill="none"/><line x1="10" y1="20" x2="30" y2="20" stroke="white" strokeWidth="2"/><path d="M20 10a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" stroke="white" strokeWidth="2" fill="none"/></svg>
    )},
    { id: "teams", label: "Microsoft Teams", color: "#5059C9", desc: "Start a Teams meeting", comingSoon: false, icon: (
      <svg width="28" height="28" viewBox="0 0 40 40" fill="none"><rect width="40" height="40" rx="10" fill="#5059C9"/><text x="50%" y="56%" dominantBaseline="middle" textAnchor="middle" fill="white" fontSize="18" fontWeight="700">T</text></svg>
    )},
    { id: "zoom",  label: "Zoom",            color: "#2D8CFF", desc: "Start a Zoom meeting", comingSoon: false, icon: (
      <svg width="28" height="28" viewBox="0 0 40 40" fill="none"><rect width="40" height="40" rx="10" fill="#9ca3af"/><path d="M8 14a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H10a2 2 0 0 1-2-2V14z" fill="white"/><path d="M26 17l6-4v14l-6-4V17z" fill="white"/></svg>
    )},
    { id: "meet",  label: "Google Meet",     color: "#00AC47", desc: "Start a Google Meet", comingSoon: false, icon: (
      <svg width="28" height="28" viewBox="0 0 40 40" fill="none"><rect width="40" height="40" rx="10" fill="#9ca3af"/><path d="M10 15h12v10H10z" fill="white"/><path d="M22 18l8-4v12l-8-4V18z" fill="#6b7280"/></svg>
    )},
  ];

  const saveExperience = async (session) => {
    const payload = {
      user_id: session.user.id,
      name: data.name || "Untitled",
      use_case: data.useCase || "recruitment",
      vendor: data.avatar || null,
      status: "draft",
      config: data,
      logo_url: data.logoPreview || null,
      updated_at: new Date().toISOString(),
    };
    if (data._dbId) {
      // Update existing record
      const { data: updated, error: dbErr } = await sb.from("experiences")
        .update(payload).eq("id", data._dbId).select().single();
      if (dbErr) throw dbErr;
      return updated;
    } else {
      // Insert new record
      const { data: inserted, error: dbErr } = await sb.from("experiences")
        .insert(payload).select().single();
      if (dbErr) throw dbErr;
      return inserted;
    }
  };

  const handleWeb = async () => {
    if (deploying || launched) return;
    setDeploying(true);
    setError("");
    try {
      // 1 вҖ” Save / update experience in DB
      const session = (await sb.auth.getSession()).data.session;
      if (!session) throw new Error("Not logged in");
      await saveExperience(session);
      if (onSaved) onSaved();

      // 2 вҖ” Create Tavus conversation
      const replicaId = data.tavusReplicaId || "r5f0577fc829";
      const personaId = data.tavusPersonaId || "pdac61133ac5";
      const resp = await fetch("/api/tavus/conversations", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          replica_id: replicaId,
          persona_id: personaId,
          conversation_name: data.name || "Sonesse Experience",
          properties: { max_call_duration: 300, enable_recording: false, apply_greenscreen: false },
        }),
      });
      const result = await resp.json();
      const url = result.conversation_url || result.data?.conversation_url;
      const cid = result.conversation_id || result.data?.conversation_id;
      if (!url) throw new Error(result.error || "No conversation URL returned");
      if (cid) trackConversation(cid, data.name || "Sonesse Experience");
      setMeetingUrl(url);
      setLaunched("web");
      window.open(url, "_blank");
    } catch (e) {
      setError(e.message || "Failed to launch web session. Please try again.");
    } finally {
      setDeploying(false);
    }
  };

  const handleTeams = async () => {
    if (deploying || launched) return;
    setDeploying(true);
    setError("");
    try {
      // 1 вҖ” Save / update experience in DB
      const session = (await sb.auth.getSession()).data.session;
      if (!session) throw new Error("Not logged in");
      const saved = await saveExperience(session);
      const expId = saved.id || data._dbId;
      if (onSaved) onSaved();

      // 2 вҖ” Create Teams meeting
      const { data: { session: authSession } } = await sb.auth.getSession();
      const userEmail = authSession?.user?.email || "";
      const resp = await fetch("/api/teams/create-meeting", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ experienceId: expId, experienceName: data.name || "Sonesse Experience", userEmail }),
      });
      const result = await resp.json();
      if (!result.ok) throw new Error(result.error || "Failed to create Teams meeting");
      const url = result.joinWebUrl || "";
      setMeetingUrl(url);
      setLaunched("teams");

      // 3 вҖ” Open Teams URL in new tab
      if (url) window.open(url, "_blank");
    } catch (e) {
      setError(e.message || "Failed to launch Teams. Please try again.");
    } finally {
      setDeploying(false);
    }
  };

  return (
    <div>
      <h2 style={{ color: theme.heading, margin: "0 0 6px", fontSize: 22, fontWeight: 700 }}>Preview your experience</h2>
      <p style={{ color: theme.textMuted, margin: "0 0 28px", fontSize: 14 }}>Review the session setup and launch a test in your preferred platform.</p>

      {/* Config summary card */}
      <div style={{ ...styles.card, padding: 0, overflow: "hidden", marginBottom: 28 }}>
        <div style={{ padding: "14px 20px", background: `linear-gradient(135deg, ${theme.primary}10, ${theme.primary}04)`, borderBottom: `1px solid ${theme.border}`, display: "flex", alignItems: "center", gap: 10 }}>
          {Icons.sparkle}
          <span style={{ fontWeight: 700, fontSize: 14, color: theme.heading }}>{data.name || "Untitled Experience"}</span>
          {data.useCase && <span style={{ fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.05em", color: theme.primary, background: theme.primaryLight, padding: "2px 10px", borderRadius: 20 }}>{data.useCase}</span>}
        </div>
        <div style={{ padding: "16px 20px", display: "grid", gridTemplateColumns: "1fr 1fr", gap: "10px 24px" }}>
          {[
            { label: "Bot type", value: data.botType === "voice" ? "Voice Bot" : "Video Avatar" },
            { label: "Vendor", value: vendor ? vendor.name : "Not selected" },
            { label: "Session type", value: data.participants === "multi" ? "Multi-Participant" : "Single Participant" },
            { label: "Tone of voice", value: data.tone || "Not set" },
            { label: "Integration", value: (data.connectedIntegrations || []).length > 0 ? (data.connectedIntegrations || []).join(", ") : "None connected" },
            { label: "Triggers", value: (data.triggers || []).length > 0 ? `${(data.triggers || []).length} configured` : "None" },
          ].map((item) => (
            <div key={item.label} style={{ display: "flex", flexDirection: "column", gap: 2 }}>
              <span style={{ fontSize: 11, fontWeight: 600, color: theme.textDim, textTransform: "uppercase", letterSpacing: "0.05em" }}>{item.label}</span>
              <span style={{ fontSize: 13, fontWeight: 600, color: theme.heading }}>{item.value}</span>
            </div>
          ))}
        </div>
      </div>

      {/* Avatar preview */}
      {vendor && vendor.previewImg && (
        <div style={{ marginBottom: 28, display: "flex", alignItems: "center", gap: 16, padding: "16px 20px", background: theme.surface, border: `1px solid ${theme.border}`, borderRadius: 12 }}>
          <img src={vendor.previewImg} alt={vendor.name} style={{ width: 56, height: 56, borderRadius: "50%", objectFit: "cover", objectPosition: "top", border: `2px solid ${theme.border}` }} onError={(e) => { e.target.style.display = "none"; }} />
          <div>
            <div style={{ fontWeight: 700, fontSize: 14, color: theme.heading, marginBottom: 2 }}>{vendor.name} avatar ready</div>
            <div style={{ fontSize: 12, color: theme.textMuted }}>{vendor.desc}</div>
          </div>
          <div style={{ marginLeft: "auto", width: 10, height: 10, borderRadius: "50%", background: theme.success, boxShadow: `0 0 0 3px ${theme.successBg}` }} />
        </div>
      )}

      {/* Launch platforms */}
      {error && <div style={{ marginBottom: 16, padding: "10px 14px", background: "rgba(239,68,68,0.08)", border: "1px solid rgba(239,68,68,0.2)", borderRadius: 8, fontSize: 13, color: theme.danger }}>{error}</div>}
      <div style={{ marginBottom: 8 }}>
        <label style={{ ...styles.label, marginBottom: 14 }}>Launch a test session in</label>
        <div className="portal-grid-4" style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 12 }}>
          {platforms.map((platform) => {
            const isTeams = platform.id === "teams";
            const isActive = !platform.comingSoon;
            const isLaunched = launched === platform.id;
            return (
              <button key={platform.id}
                onClick={() => {
                  if (deploying || launched) return;
                  if (platform.id === "web") handleWeb();
                  else if (platform.id === "teams") handleTeams();
                }}
                disabled={platform.comingSoon || deploying || (launched && !isLaunched)}
                style={{
                  padding: "18px 12px", borderRadius: 12, position: "relative",

            <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>

            </div>
          )}
        </div>
      )}
    </div>
  );
}

// Step 13: Save + Deploy (StepDeploy)
function StepDeploy({ data, onSaved, user }) {
  const [saving, setSaving]         = useState(false);
  const [saved, setSaved]           = useState(false);
  const [experienceId, setExpId]    = useState(null);
  const [error, setError]           = useState("");
  const [deploying, setDeploying]   = useState(false);
  const [deployed, setDeployed]     = useState(false);
  const [meetingUrl, setMeetingUrl] = useState("");
  const [botEmail, setBotEmail]     = useState("");
  const [deployError, setDeployError] = useState("");
  const [copied, setCopied]         = useState(false);
  const vendor = AVATAR_VENDORS.find((v) => v.id === data.avatar);

  const handleSave = async () => {
    setSaving(true);
    setError("");
    try {
      const session = (await sb.auth.getSession()).data.session;
      if (!session) throw new Error("Not logged in");
      const payload = {
        user_id: session.user.id,
        name: data.name || "Untitled",
        use_case: data.useCase || "recruitment",
        vendor: data.avatar || null,
        status: "draft",
        config: data,
        logo_url: data.logoPreview || null,
        updated_at: new Date().toISOString(),
      };
      const { data: inserted, error: dbErr } = await sb.from("experiences").insert(payload).select().single();
      if (dbErr) throw dbErr;
      setExpId(inserted.id);
      setSaved(true);
    } catch (e) {
      setError(e.message || "Failed to save. Please try again.");
    } finally {
      setSaving(false);
    }
  };

  const handleDeploy = async () => {
    setDeploying(true);
    setDeployError("");
    try {
      const { data: { session: authSession } } = await sb.auth.getSession();
      const userEmail = authSession?.user?.email || "";
      const resp = await fetch("/api/teams/create-meeting", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          experienceId,
          experienceName: data.name || "Sonesse Experience",
          userEmail,
        }),
      });
      const result = await resp.json();
      if (!result.ok) throw new Error(result.error || "Failed to create Teams meeting");
      setMeetingUrl(result.joinWebUrl || "");
      setBotEmail(result.botEmail || "");
      setDeployed(true);
      if (onSaved) onSaved();
    } catch (e) {
      setDeployError(e.message || "Failed to create Teams meeting. Please try again.");
    } finally {
      setDeploying(false);
    }
  };

  const copyUrl = () => {
    if (meetingUrl) {
      navigator.clipboard.writeText(meetingUrl).then(() => { setCopied(true); setTimeout(() => setCopied(false), 2000); });
    }
  };

  return (
    <div>
      <h2 style={{ color: theme.heading, margin: "0 0 6px", fontSize: 22, fontWeight: 700 }}>Save &amp; Deploy</h2>
      <p style={{ color: theme.textMuted, margin: "0 0 28px", fontSize: 14 }}>Review your configuration, save your experience, then deploy to Microsoft Teams.</p>

      <div style={{ display: "grid", gap: 10, marginBottom: 32 }}>
        {[
          { label: "Domain",       value: (data.useCase || "").charAt(0).toUpperCase() + (data.useCase || "").slice(1) },
          { label: "Bot type",     value: data.botType === "voice" ? "Voice Bot" : "Video Avatar" },
          { label: "Session type", value: data.participants === "multi" ? "Multi-Participant" : "Single Participant" },
          { label: "Vendor",       value: vendor ? `${vendor.name} (${vendor.type})` : "Not selected" },
          { label: "Experience",   value: data.name || "Untitled" },
          { label: "Tone",         value: data.tone || "Not set" },
          { label: "Logo",         value: data.logoName || "None" },
        ].map((item) => (
          <div key={item.label} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 16px", background: theme.surface, border: `1px solid ${theme.border}`, borderRadius: 8 }}>
            <span style={{ fontSize: 13, color: theme.textMuted, fontWeight: 500 }}>{item.label}</span>
            <span style={{ fontSize: 13, fontWeight: 600, color: theme.heading, textAlign: "right", maxWidth: "60%" }}>{item.value}</span>
          </div>
        ))}
      </div>

      {error && <div style={{ marginBottom: 16, padding: "10px 14px", background: "rgba(239,68,68,0.08)", border: "1px solid rgba(239,68,68,0.2)", borderRadius: 8, fontSize: 13, color: theme.danger }}>{error}</div>}

      {/* в”Җв”Җ Step 1: Save в”Җв”Җ */}
      {!saved && (
        <button onClick={handleSave} disabled={saving} style={{ ...styles.btnPrimary, width: "100%", justifyContent: "center", padding: "14px 20px", fontSize: 16, opacity: saving ? 0.7 : 1 }}>
          {saving ? <span>SavingвҖҰ</span> : <span style={{ display: "flex", alignItems: "center", gap: 8 }}>{Icons.rocket} Save experience</span>}
        </button>
      )}

      {/* в”Җв”Җ Step 2: Deploy to Teams в”Җв”Җ */}
      {saved && !deployed && (
        <div>
          <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "12px 16px", background: theme.successBg, border: `1px solid ${theme.successBorder}`, borderRadius: 8, marginBottom: 20 }}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={theme.success} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            <span style={{ fontSize: 13, fontWeight: 600, color: theme.success }}>Experience saved</span>
          </div>

          {deployError && <div style={{ marginBottom: 16, padding: "10px 14px", background: "rgba(239,68,68,0.08)", border: "1px solid rgba(239,68,68,0.2)", borderRadius: 8, fontSize: 13, color: theme.danger }}>{deployError}</div>}

          <button onClick={handleDeploy} disabled={deploying} style={{ ...styles.btnPrimary, width: "100%", justifyContent: "center", padding: "14px 20px", fontSize: 16, opacity: deploying ? 0.7 : 1, background: "#0078d4" }}>
            {deploying ? (
              <span>Creating Teams meetingвҖҰ</span>
            ) : (
              <span style={{ display: "flex", alignItems: "center", gap: 10 }}>
                {/* Teams logo mark */}
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M19.5 8.25a3.75 3.75 0 1 0 0-7.5 3.75 3.75 0 0 0 0 7.5zm-9 1.5a3 3 0 1 0 0-6 3 3 0 0 0 0 6zM21 10.5h-3a.75.75 0 0 0-.75.75v5.25a4.5 4.5 0 0 1-9 0v-5.25A.75.75 0 0 0 7.5 10.5H4.5A.75.75 0 0 0 3.75 11.25v5.25a7.5 7.5 0 0 0 15 0v-5.25A.75.75 0 0 0 21 10.5z"/></svg>
                Deploy to Microsoft Teams
              </span>
            )}
          </button>
          <p style={{ fontSize: 12, color: theme.textDim, textAlign: "center", marginTop: 8 }}>
            Creates a Teams meeting in your umified.com calendar and invites the meeting bot.
          </p>
        </div>
      )}

      {/* в”Җв”Җ Step 3: Deployed в”Җв”Җ */}
      {deployed && (
        <div style={{ background: theme.successBg, border: `1px solid ${theme.successBorder}`, borderRadius: 12, padding: 28 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16 }}>
            <div style={{ width: 32, height: 32, borderRadius: "50%", background: "#0078d4", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            <div>
              <h3 style={{ color: theme.heading, margin: 0, fontSize: 17, fontWeight: 700 }}>Deployed to Teams!</h3>
              <p style={{ color: theme.textMuted, margin: 0, fontSize: 12 }}>Meeting created in your umified.com calendar</p>
            </div>
          </div>

          {/* Bot email */}
          {botEmail && (
            <div style={{ marginBottom: 12, padding: "8px 14px", background: "#fff", border: `1px solid ${theme.border}`, borderRadius: 8 }}>
              <div style={{ fontSize: 11, color: theme.textMuted, fontWeight: 600, marginBottom: 3, textTransform: "uppercase", letterSpacing: "0.05em" }}>Meeting bot invited</div>
              <div style={{ fontSize: 13, fontWeight: 600, color: theme.heading, fontFamily: "monospace" }}>{botEmail}</div>
            </div>
          )}

          {/* Teams URL */}
          {meetingUrl ? (
            <div style={{ padding: "10px 14px", background: "#fff", border: `1px solid ${theme.border}`, borderRadius: 8 }}>
              <div style={{ fontSize: 11, color: theme.textMuted, fontWeight: 600, marginBottom: 6, textTransform: "uppercase", letterSpacing: "0.05em" }}>Teams join URL</div>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <span style={{ fontSize: 12, color: "#0078d4", fontFamily: "monospace", flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{meetingUrl}</span>
                <button onClick={copyUrl} style={{ ...styles.btnSecondary, padding: "5px 14px", fontSize: 12, flexShrink: 0, color: copied ? theme.success : undefined, borderColor: copied ? theme.successBorder : undefined }}>
                  {copied ? "Copied!" : "Copy"}
                </button>
                <a href={meetingUrl} target="_blank" rel="noopener noreferrer" style={{ ...styles.btnSecondary, padding: "5px 14px", fontSize: 12, flexShrink: 0, textDecoration: "none", display: "inline-flex", alignItems: "center", gap: 4 }}>
                  Open вҶ—
                </a>
              </div>
            </div>
          ) : (
            <p style={{ fontSize: 13, color: theme.textMuted, margin: 0 }}>Teams meeting created. Check your umified.com calendar for the join link.</p>
          )}
        </div>
      )}
    </div>
  );
}

function PortalHome({ user, onLogout, onNewExperience, onEditExperience, onSessions }) {
  const [experiences, setExperiences] = useState([]);
  const [loading, setLoading] = useState(true);
  const [menuOpen, setMenuOpen] = useState(null); // experience id with open menu
  const [prebuiltPersonas, setPrebuiltPersonas] = useState([]);
  const { conversations: sessionsData } = useConversations();

  const ucColors = { recruitment: "#6d28d9", sales: "#0891b2", tutoring: "#16a34a", coaching: "#d97706", lms: "#db2777", onboarding: "#4f46e5", meetingbot: "#0f766e", sdr: "#b45309" };

  const loadExperiences = async () => {
    setLoading(true);
    const session = (await sb.auth.getSession()).data.session;
    if (!session) { setLoading(false); return; }
    const { data, error } = await sb.from("experiences").select("*").eq("user_id", session.user.id).order("created_at", { ascending: false });
    if (!error && data) setExperiences(data);
    setLoading(false);
  };

  const deleteExperience = async (id) => {
    if (!window.confirm("Delete this experience?")) return;
    await sb.from("experiences").delete().eq("id", id);
    setExperiences(experiences.filter(e => e.id !== id));
    setMenuOpen(null);
  };

  // Hardcoded stock Tavus personas for the Pre-Built Avatars section
  const PRESET_PERSONAS = [
    { personaId: "pdac61133ac5", name: "Interviewer",           desc: "A professional digital interviewer conducting structured screening interviews.", tags: ["Recruitment", "Screening"] },
    { personaId: "paaee96e4f87", name: "Customer Support",      desc: "A customer success specialist available for live video support calls.", tags: ["Support", "Video"] },
    { personaId: "p1af207b8189", name: "Sales Coach",           desc: "A direct, no-nonsense B2B sales coach that gives blunt, practical feedback.", tags: ["Sales", "Coaching"] },
    { personaId: "pcb7a34da5fe", name: "Sales Development Rep", desc: "An AI SDR that qualifies leads and books meetings.", tags: ["Sales", "SDR"] },
  ];

  useEffect(() => {
    // Fetch each persona to get its replica_id, then fetch the replica thumbnail
    Promise.allSettled(
      PRESET_PERSONAS.map(p =>
        fetch(`/api/tavus/personas/${p.personaId}`)
          .then(r => r.json())
          .then(async persona => {
            if (!persona || persona.error) return { ...p };
            const replicaId = persona.replica_id || persona.default_replica_id
              || persona.data?.replica_id || persona.data?.default_replica_id || "";
            const thumbImg = persona.thumbnail_image_url || persona.thumbnail_url
              || persona.thumbnail || "";
            // Also check if the persona itself has a video URL
            let thumbVid = persona.thumbnail_video_url || persona.preview_video_url || "";
            if (!thumbVid && replicaId) {
              const rep = await fetch(`/api/tavus/replicas/${replicaId}`)
                .then(r => r.json()).catch(() => null);
              if (rep && !rep.error) {
                thumbVid = rep.thumbnail_video_url || rep.preview_video_url
                  || rep.thumbnail_url || rep.video_url || rep.preview_url || "";
              }
            }
            return { ...p, replicaId, thumb: thumbImg, thumbVid };
          })
          .catch(() => ({ ...p }))
      )
    ).then(results => {
      setPrebuiltPersonas(results.map(r => r.value || r.reason || {}));
    });
  }, []);

  useEffect(() => { loadExperiences(); }, []);

    <div style={styles.page}>
      <PortalNav user={user} onLogout={onLogout} onHome={(subview) => { if (subview === "sessions") onSessions(); }} currentView="home" />

        <div style={{ padding: "36px 0 60px" }}>

              <p style={{ color: theme.textMuted, fontSize: 14, margin: 0 }}>Manage your AI experiences and review session activity.</p>
            </div>
            <button disabled style={{ ...styles.btnPrimary, padding: "10px 18px", gap: 8, opacity: 0.45, cursor: "not-allowed" }}>

          </div>

            {[
              { label: "Total Sessions",        sub: "All time" },
              { label: "Active Experiences",    sub: "Currently live" },
              { label: "Average Session Time",  sub: "Last 30 days" },
            ].map((stat, i) => (

                <div style={{ fontSize: 24, fontWeight: 800, color: "#d1d5db", marginBottom: 2 }}>вҖ”</div>
                <div style={{ fontSize: 13, fontWeight: 600, color: "#9ca3af" }}>{stat.label}</div>
                <div style={{ fontSize: 11, color: "#d1d5db", marginTop: 1 }}>{stat.sub}</div>
              </div>
            ))}
          </div>

          {/* Pre-built avatars вҖ” hardcoded Tavus personas */}
          <div style={{ marginBottom: 36 }}>
            <div style={{ marginBottom: 14 }}>
              <h2 style={{ fontSize: 16, fontWeight: 700, color: theme.heading, margin: 0 }}>Pre-Built Avatars</h2>

                  key={p.personaId}
                  name={p.name}
                  desc={p.desc}
                  personaId={p.personaId}
                  replicaId={p.replicaId}
                  thumb={p.thumb || ""}
                  thumbVid={p.thumbVid || ""}
                  tags={[...p.tags, "Tavus"]}
                  onUse={onNewExperience}
                />
              )) : PRESET_PERSONAS.map(p => (
                <PreBuiltAvatarCard
                  key={p.personaId}
                  name={p.name}
                  desc={p.desc}
                  personaId={p.personaId}
                  tags={[...p.tags, "Tavus"]}

                />
              ))}
            </div>
          </div>

          {/* Experiences */}
          <div style={{ marginBottom: 32 }}>
            <div style={{ marginBottom: 14 }}>
              <h2 style={{ fontSize: 16, fontWeight: 700, color: theme.heading, margin: 0 }}>Your Experiences</h2>
            </div>
            {loading ? (
              <div style={{ padding: "32px", textAlign: "center", color: theme.textMuted, fontSize: 13 }}>Loading experiencesвҖҰ</div>
            ) : experiences.length === 0 ? (
              <div style={{ ...styles.card, padding: "36px 24px", textAlign: "center" }}>
                <div style={{ fontSize: 13, color: theme.textMuted }}>No experiences yet.</div>
              </div>
            ) : (
              <div style={{ display: "grid", gap: 12 }}>
                {experiences.map((exp) => (
                  <div key={exp.id} className="portal-exp-card" style={{ ...styles.card, padding: "16px 20px", display: "flex", alignItems: "center", gap: 16, position: "relative" }}>
                    <div style={{ width: 44, height: 44, borderRadius: 10, background: `${ucColors[exp.use_case] || theme.primary}15`, overflow: "hidden", flexShrink: 0, border: `1px solid ${theme.border}`, display: "flex", alignItems: "center", justifyContent: "center" }}>
                      {exp.logo_url ? (
                        <img src={exp.logo_url} alt="logo" style={{ width: "100%", height: "100%", objectFit: "contain" }} onError={(e) => { e.target.style.display = "none"; }} />
                      ) : (
                        <div style={{ width: 20, height: 20, borderRadius: 4, background: ucColors[exp.use_case] || theme.primary, opacity: 0.7 }} />
                      )}
                    </div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontWeight: 700, fontSize: 14, color: theme.heading, marginBottom: 2 }}>{exp.name}</div>
                      <div style={{ fontSize: 12, color: theme.textMuted }}>{(exp.vendor || "вҖ”").charAt(0).toUpperCase() + (exp.vendor || "вҖ”").slice(1)} вҶ’ {(exp.use_case || "").charAt(0).toUpperCase() + (exp.use_case || "").slice(1)}</div>
                    </div>
                    <span style={{ fontSize: 11, fontWeight: 700, padding: "3px 10px", borderRadius: 20, background: exp.status === "live" ? theme.successBg : theme.surface, color: exp.status === "live" ? theme.success : theme.textDim, border: `1px solid ${exp.status === "live" ? theme.successBorder : theme.border}` }}>
                      {exp.status === "live" ? "в—Ҹ Live" : "Draft"}
                    </span>
                    <button style={{ ...styles.btnSecondary, padding: "6px 14px", fontSize: 12 }}>Preview</button>
                    {/* Three-dot menu */}
                    <div style={{ position: "relative" }}>
                      <button onClick={() => setMenuOpen(menuOpen === exp.id ? null : exp.id)} style={{ background: "none", border: "none", cursor: "pointer", padding: "6px 8px", borderRadius: 6, color: theme.textMuted, fontSize: 18, lineHeight: 1 }}>вӢҜ</button>
                      {menuOpen === exp.id && (
                        <div style={{ position: "absolute", right: 0, top: "100%", background: "#fff", border: `1px solid ${theme.border}`, borderRadius: 8, boxShadow: "0 4px 16px rgba(0,0,0,0.10)", zIndex: 100, minWidth: 120, padding: 4 }}>
                          <button onClick={() => { setMenuOpen(null); onEditExperience && onEditExperience(exp); }} style={{ display: "block", width: "100%", textAlign: "left", padding: "8px 14px", fontSize: 13, color: theme.heading, background: "none", border: "none", cursor: "pointer", borderRadius: 6 }}>Edit</button>
                          <button onClick={() => deleteExperience(exp.id)} style={{ display: "block", width: "100%", textAlign: "left", padding: "8px 14px", fontSize: 13, color: theme.danger, background: "none", border: "none", cursor: "pointer", borderRadius: 6 }}>Delete</button>
                        </div>
                      )}
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>

          {/* Recent sessions preview */}
          <div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
              <h2 style={{ fontSize: 16, fontWeight: 700, color: theme.heading, margin: 0 }}>Recent Sessions</h2>
            </div>
            <SessionsTable preview={true} conversations={sessionsData} />
          </div>
        </div>
      </div>
    </div>
  );
}
