// ─── Selection card helper – consistent selected state ───
function selCard(isSelected, extraStyle = {}) {
  return {
    ...styles.cardSm,
    cursor: "pointer",
    textAlign: "left",
    borderColor: isSelected ? theme.selectedBorder : theme.border,
    background: isSelected ? theme.selectedBg : theme.surface,
    boxShadow: isSelected ? `0 0 0 1px ${theme.selectedBorder}` : "none",
    transition: "all 0.15s",
    ...extraStyle,
  };
}

// LOGIN PAGE
// ═══════════════════════════════════════════
function LoginPage({ onLogin, onForgot }) {
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [showPw, setShowPw] = useState(false);
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);

  const handleSubmit = (e) => {
    e.preventDefault();
    setError("");
    if (!email || !password) { setError("Please enter your email and password."); return; }
    setLoading(true);
    setTimeout(() => { setLoading(false); onLogin(email); }, 800);
  };

  return (
    <div style={styles.page}>
      <div style={styles.container}>
        <div style={{ textAlign: "center", marginBottom: 40 }}>
          <div style={{ display: "inline-flex", alignItems: "center", gap: 10, marginBottom: 8 }}>
            <svg width="32" height="32" viewBox="0 0 40 40"><circle cx="8" cy="20" r="4" fill="#6d28d9"/><circle cx="20" cy="20" r="4" fill="#7c3aed"/><circle cx="32" cy="20" r="4" fill="#8b5cf6"/><circle cx="14" cy="10" r="3" fill="#7c3aed"/><circle cx="26" cy="10" r="3" fill="#8b5cf6"/><circle cx="14" cy="30" r="3" fill="#7c3aed"/><circle cx="26" cy="30" r="3" fill="#8b5cf6"/></svg>
            <span style={{ fontSize: 22, fontWeight: 700, color: theme.heading, letterSpacing: "-0.02em" }}>Sonesse</span>
          </div>
          <p style={{ color: theme.textMuted, fontSize: 14, margin: 0 }}>Sign in to the Experience Builder</p>
        </div>

        <div style={styles.card}>
          <form onSubmit={handleSubmit}>
            <div style={{ marginBottom: 18 }}>
              <label style={styles.label}>Email address</label>
              <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} placeholder="you@company.com" style={styles.input} onFocus={(e) => e.target.style.borderColor = theme.borderFocus} onBlur={(e) => e.target.style.borderColor = theme.border} />
            </div>
            <div style={{ marginBottom: 8 }}>
              <label style={styles.label}>Password</label>
              <div style={{ position: "relative" }}>
                <input type={showPw ? "text" : "password"} value={password} onChange={(e) => setPassword(e.target.value)} placeholder="Enter your password" style={styles.input} onFocus={(e) => e.target.style.borderColor = theme.borderFocus} onBlur={(e) => e.target.style.borderColor = theme.border} />
                <button type="button" onClick={() => setShowPw(!showPw)} style={{ position: "absolute", right: 12, top: "50%", transform: "translateY(-50%)", background: "none", border: "none", color: theme.textMuted, cursor: "pointer", padding: 0 }}>
                  {showPw ? Icons.eyeOff : Icons.eye}
                </button>
              </div>
            </div>
            <div style={{ textAlign: "right", marginBottom: 24 }}>
              <button type="button" onClick={onForgot} style={styles.btnLink}>Forgot password?</button>
            </div>
            {error && <div style={{ color: theme.danger, fontSize: 13, marginBottom: 16, padding: "8px 12px", background: "rgba(239,68,68,0.08)", borderRadius: 6 }}>{error}</div>}

// Step 6: Integration — dropdown with OAuth / API key options
function StepIntegration({ data, onChange }) {
  const uc = data.useCase || "recruitment";
  const integrations = INTEGRATIONS[uc] || INTEGRATIONS.recruitment;
  const [selectedId, setSelectedId] = useState(data.selectedIntegration || "");
  const [authMethod, setAuthMethod] = useState("oauth");
  const [apiKeyValue, setApiKeyValue] = useState("");
  const [connecting, setConnecting] = useState(false);

  const selectedIntg = integrations.find((i) => i.id === selectedId);
  const isConnected = (data.connectedIntegrations || []).includes(selectedId);
  const systemLabel = uc === "recruitment" ? "ATS" : uc === "sales" ? "CRM" : "LMS";

  const handleConnect = () => {
    setConnecting(true);
    setTimeout(() => {
      const updated = [...new Set([...(data.connectedIntegrations || []), selectedId])];
      onChange({ ...data, connectedIntegrations: updated, selectedIntegration: selectedId });
      setConnecting(false);
    }, 1200);
  };

  return (
    <div>
      <h2 style={{ color: theme.heading, margin: "0 0 6px", fontSize: 22, fontWeight: 700 }}>Connect your {systemLabel}</h2>
      <p style={{ color: theme.textMuted, margin: "0 0 28px", fontSize: 14 }}>
        Select your integration and authenticate to enable data sync.
      </p>

      {/* Dropdown */}
      <div style={{ marginBottom: 24 }}>
        <label style={styles.label}>Select integration</label>
        <select value={selectedId} onChange={(e) => { setSelectedId(e.target.value); setAuthMethod("oauth"); setApiKeyValue(""); }} style={styles.select}>
          <option value="">Choose a {systemLabel}...</option>
          {integrations.map((intg) => {
            const connected = (data.connectedIntegrations || []).includes(intg.id);
            return <option key={intg.id} value={intg.id}>{intg.name}{connected ? " ✓ Connected" : ""}</option>;
          })}
        </select>
      </div>

      {/* Auth panel when a selection is made */}
      {selectedId && selectedIntg && (
        <div style={{ ...styles.card, padding: 24 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 20 }}>
            <div style={{ width: 48, height: 48, borderRadius: 10, background: theme.primaryLight, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 800, fontSize: 18, color: theme.primary, flexShrink: 0 }}>
              {selectedIntg.name.charAt(0)}
            </div>
            <div>
              <div style={{ fontWeight: 700, fontSize: 16, color: theme.heading }}>{selectedIntg.name}</div>
              <div style={{ fontSize: 13, color: theme.textMuted }}>{selectedIntg.desc}</div>
            </div>
            {isConnected && (
              <div style={{ marginLeft: "auto", display: "flex", alignItems: "center", gap: 6, color: theme.success, fontSize: 13, fontWeight: 600 }}>
                {Icons.check} Connected
              </div>
            )}
          </div>

          {isConnected ? (
            <div style={{ padding: "14px 16px", background: theme.successBg, borderRadius: 8, border: `1px solid ${theme.successBorder}`, fontSize: 13, color: theme.success, fontWeight: 500 }}>
              Successfully connected to {selectedIntg.name}. Data will sync automatically.
            </div>
          ) : (
            <>
              {/* Auth method toggle */}
              <div style={{ display: "flex", gap: 8, marginBottom: 20 }}>
                <button onClick={() => setAuthMethod("oauth")} style={{
                  flex: 1, padding: "10px 16px", borderRadius: 8, fontSize: 13, fontWeight: 600, cursor: "pointer",
                  border: `1.5px solid ${authMethod === "oauth" ? theme.primary : theme.border}`,
                  background: authMethod === "oauth" ? theme.selectedBg : "transparent",
                  color: authMethod === "oauth" ? theme.primary : theme.textMuted,
                  display: "flex", alignItems: "center", justifyContent: "center", gap: 8,
                }}>
                  {Icons.link} OAuth
                </button>
                <button onClick={() => setAuthMethod("apikey")} style={{
                  flex: 1, padding: "10px 16px", borderRadius: 8, fontSize: 13, fontWeight: 600, cursor: "pointer",
                  border: `1.5px solid ${authMethod === "apikey" ? theme.primary : theme.border}`,
                  background: authMethod === "apikey" ? theme.selectedBg : "transparent",
                  color: authMethod === "apikey" ? theme.primary : theme.textMuted,
                  display: "flex", alignItems: "center", justifyContent: "center", gap: 8,
                }}>
                  {Icons.key} API Key
                </button>
              </div>

              {authMethod === "oauth" ? (
                <div>
                  <div style={{ padding: 16, background: theme.bg, borderRadius: 8, border: `1px solid ${theme.border}`, textAlign: "center", marginBottom: 16 }}>
                    <div style={{ fontSize: 13, color: theme.textMuted, marginBottom: 8 }}>You'll be redirected to {selectedIntg.name} to authorise access.</div>
                    <div style={{ fontSize: 11, color: theme.textDim }}>Permissions: Read contacts · Read/Write records · Webhooks</div>
                  </div>
                  <button onClick={handleConnect} disabled={connecting} style={{ ...styles.btnPrimary, width: "100%", justifyContent: "center", opacity: connecting ? 0.7 : 1 }}>
                    {connecting ? "Connecting..." : `Authorise with ${selectedIntg.name}`}
                  </button>
                </div>
              ) : (
                <div>
                  <div style={{ marginBottom: 16 }}>
                    <label style={styles.label}>API Key</label>
                    <input type="password" value={apiKeyValue} onChange={(e) => setApiKeyValue(e.target.value)} placeholder="Paste your API key here" style={styles.input} onFocus={(e) => e.target.style.borderColor = theme.borderFocus} onBlur={(e) => e.target.style.borderColor = theme.border} />
                    <div style={{ fontSize: 11, color: theme.textDim, marginTop: 6 }}>Find your API key in {selectedIntg.name} → Settings → API & Integrations</div>
                  </div>
                  <button onClick={handleConnect} disabled={connecting || !apiKeyValue} style={{ ...styles.btnPrimary, width: "100%", justifyContent: "center", opacity: (connecting || !apiKeyValue) ? 0.5 : 1 }}>
                    {connecting ? "Connecting..." : "Connect with API Key"}
                  </button>
                </div>
              )}
            </>
          )}
        </div>
      )}
    </div>
  );
}

// Step 7: Trigger Workflow
function StepTriggerWorkflow({ data, onChange }) {
  return (
    <div>
      <h2 style={{ color: theme.heading, margin: "0 0 6px", fontSize: 22, fontWeight: 700 }}>Trigger workflow</h2>
      <p style={{ color: theme.textMuted, margin: "0 0 24px", fontSize: 14 }}>What starts an avatar session? Select all that apply.</p>
      <div style={{ display: "grid", gap: 10 }}>
        {TRIGGER_OPTIONS.map((opt) => {
          const isSelected = (data.triggers || []).includes(opt.id);
          return (
            <button key={opt.id} onClick={() => {
              const triggers = data.triggers || [];

// WIZARD SHELL
// ═══════════════════════════════════════════
function Wizard({ user, onLogout }) {
  const [step, setStep] = useState(0);
  const [data, setData] = useState({});

  const canProceed = () => {
    switch (step) {
      case 0: return data.useCase;
      case 1: return data.botType;
      case 2: return data.participants;
      case 3: return data.avatar;
      case 4: return data.name;
      case 5: return true; // integration optional
      case 6: return true; // triggers optional
      case 7: return true; // post-meeting optional
      case 8: return true; // notifications optional
      case 9: return true; // email optional
      case 10: return true; // preview optional
      case 11: return true; // deploy
      default: return false;
    }
  };

  const totalSteps = WIZARD_STEPS.length;

  return (
    <div style={styles.page}>
      {/* Top bar */}
      <div style={{ borderBottom: `1px solid ${theme.border}`, padding: "12px 24px", display: "flex", justifyContent: "space-between", alignItems: "center", position: "sticky", top: 0, background: "#ffffff", zIndex: 50 }}>

          <span style={{ fontWeight: 700, color: theme.heading, fontSize: 15 }}>Sonesse</span>
          <span style={{ color: theme.textDim, fontSize: 13 }}>/</span>
          <span style={{ color: theme.textMuted, fontSize: 13 }}>Experience Builder</span>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
          {/* Progress indicator */}
          <span style={{ fontSize: 12, color: theme.textDim, fontWeight: 500 }}>Step {step + 1} of {totalSteps}</span>
          <div style={{ width: 80, height: 4, background: theme.border, borderRadius: 2, overflow: "hidden" }}>
            <div style={{ width: `${((step + 1) / totalSteps) * 100}%`, height: "100%", background: theme.primary, borderRadius: 2, transition: "width 0.3s" }} />
          </div>
          <span style={{ fontSize: 12, color: theme.textMuted, display: "flex", alignItems: "center", gap: 6 }}>{Icons.user} {user}</span>
          <button onClick={onLogout} style={{ ...styles.btnGhost, color: theme.textDim }}>{Icons.logout}</button>
        </div>
      </div>

      {/* Wizard content */}
      <div style={styles.wideContainer}>
        <div style={{ padding: "32px 0 60px" }}>
          {step === 0 && <StepUseCase data={data} onChange={setData} />}
          {step === 1 && <StepBotType data={data} onChange={setData} />}
          {step === 2 && <StepParticipants data={data} onChange={setData} />}
          {step === 3 && <StepAvatar data={data} onChange={setData} />}
          {step === 4 && <StepPersona data={data} onChange={setData} />}
          {step === 5 && <StepIntegration data={data} onChange={setData} />}
          {step === 6 && <StepTriggerWorkflow data={data} onChange={setData} />}
          {step === 7 && <StepPostMeeting data={data} onChange={setData} />}
          {step === 8 && <StepNotifications data={data} onChange={setData} />}
          {step === 9 && <StepCustomEmail data={data} onChange={setData} />}
          {step === 10 && <StepPreview data={data} />}
          {step === 11 && <StepDeploy data={data} />}

          {/* Navigation */}
          <div style={styles.wizardNav}>
            {step > 0 ? (
              <button onClick={() => setStep(step - 1)} style={styles.btnSecondary}>
                {Icons.arrowLeft} <span>Back</span>
              </button>
            ) : <div />}
            {step < totalSteps - 1 && (
              <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                <button onClick={() => setStep(step + 1)} style={{ ...styles.btnGhost, color: theme.textDim, fontSize: 13, fontWeight: 500 }}>
                  Skip
                </button>
                <button onClick={() => canProceed() && setStep(step + 1)} disabled={!canProceed()} style={{ ...styles.btnPrimary, opacity: canProceed() ? 1 : 0.4 }}>
                  <span>Continue</span> {Icons.arrowRight}
                </button>
              </div>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════
// APP ROOT
// ═══════════════════════════════════════════
function App() {
  const [view, setView] = useState("login"); // login | forgot | wizard
  const [user, setUser] = useState("");

  if (view === "forgot") return <ForgotPasswordPage onBack={() => setView("login")} />;
  if (view === "wizard") return <Wizard user={user} onLogout={() => { setUser(""); setView("login"); }} />;
  return <LoginPage onLogin={(email) => { setUser(email); setView("wizard"); }} onForgot={() => setView("forgot")} />;
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
