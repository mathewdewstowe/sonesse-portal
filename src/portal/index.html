// Track a conversation against the current user in localStorage
async function trackConversation(conversationId, name) {
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (!session?.user?.id) return;
    const key = `sonesse_sessions_${session.user.id}`;
    const existing = JSON.parse(localStorage.getItem(key) || "[]");
    if (!existing.find(s => s.conversation_id === conversationId)) {
      existing.unshift({ conversation_id: conversationId, name, created_at: new Date().toISOString() });
      localStorage.setItem(key, JSON.stringify(existing.slice(0, 500)));
    }
  } catch (_) {}
}

function useConversations() {
  const [conversations, setConversations] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState("");

  useEffect(() => {
    fetch("/api/tavus/conversations")
      .then((r) => r.json())
      .then((d) => {
        const list = Array.isArray(d) ? d : (d.data || d.conversations || []);
        // Sort newest first
        const sorted = [...list].sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0));
        setConversations(sorted);
      })
      .catch((e) => setError(e.message || "Failed to load sessions"))
      .finally(() => setLoading(false));
  }, []);

  return { conversations, loading, error };
}

function TranscriptModal({ transcript, name, onClose }) {
  // Tavus may return transcript as an array of {role,content} objects or as a plain string
  const lines = Array.isArray(transcript) ? transcript : [];
  const rawText = typeof transcript === "string" ? transcript.trim() : "";
  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.45)", zIndex: 9999, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }} onClick={onClose}>
      <div style={{ background: "#fff", borderRadius: 14, width: "100%", maxWidth: 620, maxHeight: "80vh", overflow: "hidden", display: "flex", flexDirection: "column", boxShadow: "0 20px 60px rgba(0,0,0,0.25)" }} onClick={(e) => e.stopPropagation()}>
        <div style={{ padding: "18px 22px", borderBottom: `1px solid ${theme.border}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div style={{ fontWeight: 700, fontSize: 15, color: theme.heading }}>{Icons.fileText} Transcript вҖ” {name}</div>
          <button onClick={onClose} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 20, color: theme.textMuted, lineHeight: 1, padding: "0 4px" }}>Г—</button>
        </div>
        <div style={{ overflowY: "auto", padding: "18px 22px", flex: 1 }}>
          {rawText ? (
            <p style={{ fontSize: 13, color: theme.heading, lineHeight: 1.7, whiteSpace: "pre-wrap" }}>{rawText}</p>
          ) : lines.length === 0 ? (
            <p style={{ color: theme.textMuted, fontSize: 13 }}>No transcript available yet. Transcripts are generated after a session ends вҖ” check back once the session status shows Completed.</p>
          ) : (
            lines.map((line, i) => (
              <div key={i} style={{ marginBottom: 12 }}>
                <span style={{ fontWeight: 700, fontSize: 12, color: line.role === "assistant" ? theme.primary : theme.heading, textTransform: "capitalize", marginRight: 8 }}>{line.role === "assistant" ? "Avatar" : "Participant"}:</span>
                <span style={{ fontSize: 13, color: theme.heading }}>{line.content || line.text || line.message || JSON.stringify(line)}</span>
              </div>
            ))
          )}
        </div>
      </div>
    </div>
  );
}

function SessionsTable({ preview = false, conversations: propConversations }) {
  const hook = useConversations();
  // Use passed conversations (already fetched by parent) or fetch our own
  const conversations = propConversations !== undefined ? propConversations : hook.conversations;
  const loading = propConversations !== undefined ? false : hook.loading;
  const error   = propConversations !== undefined ? ""    : hook.error;
  const [transcriptOpen, setTranscriptOpen] = useState(null);
  const [recordingOpen, setRecordingOpen]   = useState(null);
  const [fetching, setFetching]             = useState({});
  const rows = preview ? conversations.slice(0, 4) : conversations;

  const fmtDate = (iso) => {
    if (!iso) return "вҖ”";
    const d = new Date(iso);
    return { date: d.toLocaleDateString("en-GB", { day: "2-digit", month: "short", year: "numeric" }), time: d.toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit" }) };
  };

  const fmtDuration = (c) => {
    if (!c.ended_at || !c.created_at) return "вҖ”";
    const secs = Math.round((new Date(c.ended_at) - new Date(c.created_at)) / 1000);
    if (secs < 60) return `${secs}s`;
    return `${Math.floor(secs / 60)}m ${secs % 60}s`;
  };

  const statusStyle = (status) => ({
    fontSize: 11, fontWeight: 700, padding: "2px 8px", borderRadius: 20,
    background: status === "ended" ? theme.successBg : status === "active" ? "rgba(99,102,241,0.08)" : "rgba(239,68,68,0.08)",
    color: status === "ended" ? theme.success : status === "active" ? theme.primary : theme.danger,
    border: `1px solid ${status === "ended" ? theme.successBorder : status === "active" ? "rgba(99,102,241,0.2)" : "rgba(239,68,68,0.2)"}`,
  });

  // Fetch full conversation detail then open transcript or recording modal
  const openDetail = async (c, type) => {
    const id = c.conversation_id;
    // If we already have the data on the object, open immediately
    if (type === "transcript" && c.transcript) {
      setTranscriptOpen({ transcript: c.transcript, name: c.conversation_name || id }); return;
    }
    if (type === "recording" && c.recording_url) {
      setRecordingOpen({ url: c.recording_url, name: c.conversation_name || id }); return;
    }
    setFetching(f => ({ ...f, [id]: type }));
    try {
      const resp = await fetch(`/api/tavus/conversations/${id}`);
      const detail = await resp.json();
      const conv = detail.data || detail;
      if (type === "transcript") {
        setTranscriptOpen({ transcript: conv.transcript || [], name: conv.conversation_name || id });
      } else {
        if (conv.recording_url) setRecordingOpen({ url: conv.recording_url, name: conv.conversation_name || id });
        else setRecordingOpen({ url: null, name: conv.conversation_name || id });
      }
    } catch (e) {
      alert("Failed to load session details.");
    } finally {
      setFetching(f => { const n = { ...f }; delete n[id]; return n; });
    }
  };

  if (loading) return <div style={{ ...styles.card, padding: 28, textAlign: "center", color: theme.textMuted, fontSize: 13 }}>Loading sessionsвҖҰ</div>;
  if (error) return <div style={{ ...styles.card, padding: 28, color: theme.danger, fontSize: 13 }}>{error}</div>;

  return (
    <>
      {transcriptOpen && <TranscriptModal transcript={transcriptOpen.transcript} name={transcriptOpen.name} onClose={() => setTranscriptOpen(null)} />}
      {recordingOpen && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.55)", zIndex: 9999, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }} onClick={() => setRecordingOpen(null)}>
          <div style={{ background: "#fff", borderRadius: 14, width: "100%", maxWidth: 700, overflow: "hidden", boxShadow: "0 20px 60px rgba(0,0,0,0.3)" }} onClick={e => e.stopPropagation()}>
            <div style={{ padding: "14px 18px", borderBottom: `1px solid ${theme.border}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div style={{ fontWeight: 700, fontSize: 15, color: theme.heading }}>{Icons.video} Recording вҖ” {recordingOpen.name}</div>
              <button onClick={() => setRecordingOpen(null)} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 20, color: theme.textMuted, padding: "0 4px" }}>Г—</button>
            </div>
            <div style={{ padding: 20 }}>
              {recordingOpen.url ? (
                <>
                  <video controls style={{ width: "100%", borderRadius: 8, maxHeight: 400 }} src={recordingOpen.url} />
                  <div style={{ marginTop: 10, textAlign: "center" }}>
                    <a href={recordingOpen.url} target="_blank" rel="noreferrer" style={{ ...styles.btnLink, fontSize: 12 }}>Open in new tab вҶ—</a>
                  </div>
                </>
              ) : (
                <p style={{ color: theme.textMuted, fontSize: 13, textAlign: "center" }}>No recording available for this session.</p>
              )}
            </div>
          </div>
        </div>
      )}
      <div className="portal-table-wrap" style={{ ...styles.card, padding: 0, overflowX: "auto", overflowY: "hidden" }}>
        <table style={{ width: "100%", minWidth: 600, borderCollapse: "collapse", fontSize: 13 }}>
          <thead>
            <tr style={{ background: theme.surface, borderBottom: `1px solid ${theme.border}` }}>
              {["Session", "Date & Time", "Duration", "Status", "Transcript", "Recording"].map((h) => (
                <th key={h} style={{ padding: "10px 16px", textAlign: "left", fontSize: 12, fontWeight: 600, color: theme.textMuted, whiteSpace: "nowrap" }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {rows.length === 0 ? (
              <tr><td colSpan={6} style={{ padding: "32px 16px", textAlign: "center", color: theme.textMuted, fontSize: 13 }}>No sessions yet. Launch your first test session from the Preview step.</td></tr>
            ) : rows.map((c, i) => {
              const dt = fmtDate(c.created_at);
              const isFetchingThis = !!fetching[c.conversation_id];
              return (
                <tr key={c.conversation_id || i} style={{ borderBottom: i < rows.length - 1 ? `1px solid ${theme.border}` : "none" }}>
                  <td style={{ padding: "12px 16px" }}>
                    <div style={{ fontWeight: 600, color: theme.heading }}>{c.conversation_name || c.conversation_id || "Session"}</div>
                    <div style={{ fontSize: 11, color: theme.textMuted, fontFamily: "monospace" }}>{c.conversation_id}</div>
                  </td>
                  <td style={{ padding: "12px 16px", whiteSpace: "nowrap" }}>
                    {typeof dt === "object" ? (<><div style={{ color: theme.heading, fontWeight: 500 }}>{dt.date}</div><div style={{ fontSize: 11, color: theme.textMuted }}>{dt.time}</div></>) : <span style={{ color: theme.textMuted }}>вҖ”</span>}
                  </td>
                  <td style={{ padding: "12px 16px", color: theme.textMuted }}>{fmtDuration(c)}</td>
                  <td style={{ padding: "12px 16px" }}>
                    <span style={statusStyle(c.status)}>{c.status === "ended" ? "Completed" : c.status === "active" ? "Live" : c.status || "Unknown"}</span>
                  </td>
                  <td style={{ padding: "12px 16px" }}>
                    <button
                      onClick={() => openDetail(c, "transcript")}
                      disabled={isFetchingThis && fetching[c.conversation_id] === "transcript"}
                      style={{ ...styles.btnLink, fontSize: 12, display: "inline-flex", alignItems: "center", gap: 4, opacity: isFetchingThis ? 0.6 : 1 }}
                    >
                      {Icons.fileText} {isFetchingThis && fetching[c.conversation_id] === "transcript" ? "LoadingвҖҰ" : "View"}
                    </button>
                  </td>
                  <td style={{ padding: "12px 16px" }}>
                    <span style={{ fontSize: 12, color: "#d1d5db", display: "inline-flex", alignItems: "center", gap: 4, cursor: "not-allowed" }} title="Coming soon">
                      {Icons.video} <span style={{ textDecoration: "line-through" }}>Watch</span>
                    </span>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </>
  );
}

function Wizard({ user, onLogout, onHome, onSaved, initialData }) {
  const [step, setStep] = useState(0);
  const [data, setData] = useState(initialData || { useCase: "recruitment" });

  const canProceed = () => {
    switch (step) {
      case 0: return data.useCase;
      case 1: return data.botType;
      case 2: return data.participants;
      case 3: return data.avatar;
      case 4: return data.tavusReplicaId || true; // optional вҖ” can skip
      case 5: return true;  // avatarsettings вҖ” optional
      case 6: return data.name;
      case 7: return true;  // knowledgebase вҖ” optional
      default: return true;
    }
  };

  const totalSteps = WIZARD_STEPS.length;

  return (
    <div style={styles.page}>
      <PortalNav user={user} onLogout={onLogout} onHome={onHome} currentView="wizard" />

      {/* Wizard content */}
      <div className="portal-wide-container" style={styles.wideContainer}>
        <div style={{ padding: "28px 0 60px" }}>
          {/* Breadcrumb + progress */}
          <div className="portal-wizard-header" style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 28 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <button onClick={onHome} style={{ ...styles.btnLink, fontSize: 13, color: theme.textMuted }}>Portal</button>
              <span style={{ color: theme.textDim }}>вҖә</span>
              <span style={{ fontSize: 13, color: theme.heading, fontWeight: 600 }}>New Experience</span>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <span style={{ fontSize: 12, color: theme.textDim, fontWeight: 500 }}>Step {step + 1} of {totalSteps}</span>
              <div style={{ width: 120, height: 4, background: theme.border, borderRadius: 2, overflow: "hidden" }}>
                <div style={{ width: `${((step + 1) / totalSteps) * 100}%`, height: "100%", background: theme.primary, borderRadius: 2, transition: "width 0.3s" }} />
              </div>
            </div>
          </div>

          {step === 0  && <StepUseCase data={data} onChange={setData} />}
          {step === 1  && <StepBotType data={data} onChange={setData} />}
          {step === 2  && <StepParticipants data={data} onChange={setData} />}
          {step === 3  && <StepAvatar data={data} onChange={setData} />}
          {step === 4  && <StepChooseTavusAvatar data={data} onChange={setData} />}
          {step === 5  && <StepAvatarSettings data={data} onChange={setData} />}
          {step === 6  && <StepPersona data={data} onChange={setData} />}
          {step === 7  && <StepKnowledgeBase data={data} onChange={setData} />}
          {step === 8  && <StepIntegration data={data} onChange={setData} />}
          {step === 9  && <StepTriggerWorkflow data={data} onChange={setData} />}
          {step === 10 && <StepDataSources data={data} onChange={setData} />}
          {step === 11 && <StepPostMeeting data={data} onChange={setData} />}
          {step === 12 && <StepPreview data={data} />}
          {step === 13 && <StepDeploy data={data} onSaved={onSaved} user={user} />}

          {/* Navigation */}
          <div className="portal-wizard-nav" style={styles.wizardNav}>
            {step > 0 ? (
              <button onClick={() => setStep(step - 1)} style={styles.btnSecondary}>
                {Icons.arrowLeft} <span>Back</span>
              </button>
            ) : <div />}
            {step < totalSteps - 1 && (
              <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                <button onClick={() => setStep(step + 1)} style={{ ...styles.btnGhost, color: theme.textDim, fontSize: 13, fontWeight: 500 }}>
                  Skip
                </button>
                <button onClick={() => canProceed() && setStep(step + 1)} disabled={!canProceed()} style={{ ...styles.btnPrimary, opacity: canProceed() ? 1 : 0.4 }}>
                  <span>Continue</span> {Icons.arrowRight}
                </button>
              </div>
            )}
          </div>
        </div>

function ProfileModal({ onDone }) {
  const [fullName, setFullName] = useState("");
  const [company, setCompany] = useState("");
  const [url, setUrl] = useState("");
  const [industry, setIndustry] = useState("");
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState("");

  const handleSave = async () => {
    if (!fullName.trim() || !company.trim()) { setError("Full name and company are required."); return; }
    setSaving(true);
    setError("");
    try {
      const session = (await sb.auth.getSession()).data.session;
      if (!session) throw new Error("Not logged in");
      const { error: err } = await sb.from("profiles").upsert({
        id: session.user.id,
        full_name: fullName.trim(),
        company: company.trim(),
        url: url.trim(),
        industry,
      });
      if (err) throw err;
      onDone();
    } catch (e) {
      setError(e.message || "Could not save profile.");
    } finally {
      setSaving(false);
    }
  };

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.45)", zIndex: 999, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
      <div style={{ background: "#fff", borderRadius: 16, padding: 36, width: "100%", maxWidth: 480, boxShadow: "0 20px 60px rgba(0,0,0,0.18)" }}>
        <div style={{ marginBottom: 28, textAlign: "center" }}>
          <svg width="32" height="32" viewBox="0 0 40 40" style={{ marginBottom: 12 }}><circle cx="8" cy="20" r="4" fill="#6d28d9"/><circle cx="20" cy="20" r="4" fill="#7c3aed"/><circle cx="32" cy="20" r="4" fill="#8b5cf6"/></svg>
          <h2 style={{ color: theme.heading, margin: "0 0 6px", fontSize: 20, fontWeight: 700 }}>Complete your profile</h2>
          <p style={{ color: theme.textMuted, fontSize: 14, margin: 0 }}>Tell us a little about yourself to get started.</p>
        </div>

        <div style={{ display: "grid", gap: 16 }}>
          <div>
            <label style={styles.label}>Full name <span style={{ color: theme.danger }}>*</span></label>
            <input value={fullName} onChange={(e) => setFullName(e.target.value)} placeholder="Jane Smith" style={styles.input} onFocus={(e) => e.target.style.borderColor = theme.borderFocus} onBlur={(e) => e.target.style.borderColor = theme.border} />
          </div>
          <div>
            <label style={styles.label}>Company <span style={{ color: theme.danger }}>*</span></label>
            <input value={company} onChange={(e) => setCompany(e.target.value)} placeholder="Acme Corp" style={styles.input} onFocus={(e) => e.target.style.borderColor = theme.borderFocus} onBlur={(e) => e.target.style.borderColor = theme.border} />
          </div>
          <div>
            <label style={styles.label}>Company website</label>
            <input value={url} onChange={(e) => setUrl(e.target.value)} placeholder="https://acme.com" style={styles.input} onFocus={(e) => e.target.style.borderColor = theme.borderFocus} onBlur={(e) => e.target.style.borderColor = theme.border} />
          </div>
          <div>
            <label style={styles.label}>Industry</label>
            <select value={industry} onChange={(e) => setIndustry(e.target.value)} style={styles.select}>
              <option value="">Select industryвҖҰ</option>
              {LINKEDIN_SECTORS.map(s => <option key={s} value={s}>{s}</option>)}
            </select>
          </div>
        </div>

        {error && <div style={{ marginTop: 14, padding: "10px 14px", background: "rgba(239,68,68,0.08)", border: "1px solid rgba(239,68,68,0.2)", borderRadius: 8, fontSize: 13, color: theme.danger }}>{error}</div>}

        <button onClick={handleSave} disabled={saving} style={{ ...styles.btnPrimary, width: "100%", justifyContent: "center", marginTop: 24, padding: "12px 20px", fontSize: 15, opacity: saving ? 0.7 : 1 }}>
          {saving ? "SavingвҖҰ" : "Get started"}
        </button>
      </div>
    </div>
  );
}

export default function App() {
  // login | signup | forgot | reset-password | home | sessions | wizard
  const [view, setView]       = useState("login");
  const [user, setUser]       = useState("");
  const [authReady, setAuthReady] = useState(false);
  const [showProfile, setShowProfile] = useState(false);
  const [profileChecked, setProfileChecked] = useState(false);

  useEffect(() => {
    // 1. Check if the URL contains a Supabase password-reset token
    //    Supabase appends #access_token=...&type=recovery to the redirect URL
    const hash = window.location.hash;
    if (hash.includes("type=recovery") || hash.includes("type=invite")) {
      setView("reset-password");
      setAuthReady(true);
      return;
    }

    // 2. Restore an existing session (user already logged in)
    sb.auth.getSession().then(async ({ data: { session } }) => {
      if (session) {
        setUser(session.user.email);
        setView("home");
        // Check if profile exists
        try {
          const { data: prof } = await sb.from("profiles").select("id").eq("id", session.user.id).single();
          if (!prof) setShowProfile(true);
        } catch (e) { console.warn("Profile check failed:", e); }
        setProfileChecked(true);
      }
      setAuthReady(true);
    }).catch(() => setAuthReady(true));

    // 3. Listen for auth changes (sign in / sign out / token refresh)
    const { data: { subscription } } = sb.auth.onAuthStateChange((_event, session) => {
      if (session) {
        setUser(session.user.email);
        if (view === "login" || view === "signup" || view === "reset-password") {
          setView("home");
        }
      } else {
        setUser("");
        setView("login");
        setShowProfile(false);
        setProfileChecked(false);
      }
    });

    return () => subscription.unsubscribe();
  }, []);

  const [editExp, setEditExp] = useState(null);

  const handleLogin  = (email) => { setUser(email); setView("home"); };
  const handleLogout = async () => { await sb.auth.signOut(); setUser(""); setView("login"); };
  const goHome       = (subview) => setView(subview || "home");

  const handleEdit = (exp) => {
    // Restore the full wizard state from the saved config blob,
    // then overlay the DB-level fields so they're correct.
    const wizardData = {
      ...(exp.config || {}),   // unpack all saved wizard fields (JD, candidate, voice, etc.)
      _dbId: exp.id,           // track the DB row for upsert on re-save
      name:    exp.name     || exp.config?.name,
      useCase: exp.use_case || exp.config?.useCase,
      avatar:  exp.vendor   || exp.config?.avatar,
    };
    setEditExp(wizardData);
    setView("wizard");
  };

  // Show nothing until auth state is resolved to avoid flash of login page
  if (!authReady) return (
    <div style={{ display: "flex", alignItems: "center", justifyContent: "center", minHeight: "100vh", background: "#fff" }}>
      <div style={{ textAlign: "center" }}>
        <svg width="32" height="32" viewBox="0 0 40 40" style={{ marginBottom: 12 }}><circle cx="8" cy="20" r="4" fill="#6d28d9"/><circle cx="20" cy="20" r="4" fill="#7c3aed"/><circle cx="32" cy="20" r="4" fill="#8b5cf6"/></svg>
        <div style={{ fontSize: 13, color: "#9ca3af" }}>LoadingвҖҰ</div>
      </div>
    </div>
  );

  if (view === "signup")         return <SignUpPage onBack={() => setView("login")} onSignedUp={handleLogin} />;
  if (view === "forgot")         return <ForgotPasswordPage onBack={() => setView("login")} />;
  if (view === "reset-password") return <ResetPasswordPage onDone={() => setView("home")} />;
  if (view === "home")           return (
    <>
      <PortalHome user={user} onLogout={handleLogout} onNewExperience={() => { setEditExp(null); setView("wizard"); }} onEditExperience={handleEdit} onSessions={() => setView("sessions")} />
      {showProfile && <ProfileModal onDone={() => setShowProfile(false)} />}
    </>
  );
  if (view === "sessions")       return <SessionsPage user={user} onLogout={handleLogout} onHome={goHome} />;
  if (view === "wizard")         return <Wizard user={user} onLogout={handleLogout} onHome={goHome} onSaved={() => { setEditExp(null); setView("home"); }} initialData={editExp} />;
  return <LoginPage onLogin={handleLogin} onForgot={() => setView("forgot")} onSignUp={() => setView("signup")} />;
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
